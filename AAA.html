<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <!-- [关键修改] 声明网页为深色模式，且将主题色强制锁死为纯黑色 -->
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#000000">
    <title>✨🐈</title>

    <!-- [极致优化] DNS 预解析与 TCP 预连接 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://me2077.github.io" crossorigin>

    <!-- HTML 原生 preload 提前加载大体积背景图 -->
    <link rel="preload" as="image" href="https://me2077.github.io/images/AAA.png">
    <link rel="preload" as="image" href="/images/CCC.JPG">
    <link rel="preload" as="image" href="/images/DDD.JPG">

    <!-- 图标资源配置 -->
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
    <link rel="shortcut icon" href="favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="qxx">
    <link rel="manifest" href="favicon/site.webmanifest">

    <style>
        /* CSS 变量与核心主题系统 */
        :root {
            --glow-sens: 30;
            --dark: hsl(260, 25%, 10%);
            --fg: black;
            --h: 260;
            --card-bg: linear-gradient(8deg, var(--dark) 75%, color-mix(in hsl, var(--dark), white 2.5%) 75.5%);
            --blend: soft-light;
            --glow-blend: plus-lighter;
            --glow-color: 40deg 80% 80%;
            --duration: 1s;
            --ease-slider: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-timeline: cubic-bezier(0.71, 0.21, 0.3, 0.95);
            --page-height: 498px;
            --accent: hsl(260, 100%, 80%);
            --glowing-card-bg: rgb(255 255 255 / 15%);
            --glowing-card-border: rgb(255 255 255 / 70%);
            --glowing-card-backdrop: blur(7px);
            --link-card-bg: rgb(255 255 255 / 9%);
            --link-card-hover-bg: rgb(255 255 255 / 25%);
            --link-card-border: rgb(255 255 255 / 40%);
            --link-card-box-shadow: 0px 4px 3px #0001, 0 0 35px #fffa inset;
            --spotify-card-bg: rgb(255 255 255 / 15%);
            --spotify-card-border: rgb(255 255 255 / 45%);
            --spotify-card-box-shadow: 0px 4px 3px #0001, 0 0 38px #fffa inset;
            --music-player-bg: rgb(255 255 255 / 15%);
            --music-player-shadow: none;
        }

        .light {
            --card-bg: linear-gradient(8deg, color-mix(in hsl, hsl(260, 25%, 95%), var(--dark) 2.5%) 75%, hsl(260, 25%, 95%) 75.5%);
            --blend: darken;
            --glow-blend: luminosity;
            --glow-color: 280deg 90% 95%;
            --glowing-card-bg: rgb(255 255 255 / 13%);
            --glowing-card-border: rgb(255 255 255 / 80%);
            --glowing-card-backdrop: blur(7px);
            --link-card-bg: rgb(255 255 255 / 7%);
            --link-card-hover-bg: rgb(255 255 255 / 25%);
            --link-card-border: rgb(255 255 255 / 45%);
            --link-card-box-shadow: 0px 4px 3px #0001, 0 0 25px #fffa inset;
            --spotify-card-bg: rgb(255 255 255 / 7%);
            --spotify-card-border: rgb(255 255 255 / 60%);
            --spotify-card-box-shadow: 0px 4px 3px #0001, 0 0 38px #fffa inset;
            --music-player-bg: rgb(255 255 255 / 10%);
            --music-player-shadow: 0 2px 6px 1px #0000001f;
        }

        /* 全局基础样式 */
        body {
            /* [关键修改] 强制锁死 body 的背景颜色，彻底杜绝 Safari 嗅探图片颜色 */
            background-color: #000000 !important;
            background-image: none !important;
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: var(--fg);
            overflow: hidden;
            touch-action: manipulation;
            transition: color 0.8s ease;
        }

        /* [新增核心修复] 物理遮挡顶部刘海区域和底部地址栏区域，保证 Safari 磨砂玻璃透出的是纯黑色 */
        body::before, body::after {
            content: "";
            position: fixed;
            left: 0; right: 0;
            background-color: #000000;
            z-index: 99999;
            pointer-events: none;
        }
        body::before {
            top: 0;
            height: env(safe-area-inset-top);
        }
        body::after {
            bottom: 0;
            height: env(safe-area-inset-bottom);
        }

        /* [底层背景墙] 替代原来的 body 背景 */
        #bg-base-layer {
            position: fixed;
            inset: 0;
            z-index: -3;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-image: url('https://raw.githubusercontent.com/me2077/me2077.github.io/main/images/AAA.png');
        }

        /* [新增修复] 过渡覆盖层样式 */
        #bg-transition-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            will-change: opacity;
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100dvh;
            z-index: -1;
        }

        /* 外部发光毛玻璃容器卡片 */
        .glowing-card {
            position: relative;
            width: 100%;
            max-width: 345px;
            height: 510px;
            flex-shrink: 0;
            border-radius: 20px;
            isolation: isolate;
            transform: translateZ(0);
            background: var(--glowing-card-bg);
            box-shadow: 0px 10px 15px transparent, 0 0 55px #fff inset;
            overflow: hidden;
            text-align: center;
            box-sizing: border-box;
            border: 1px solid var(--glowing-card-border);
            backdrop-filter: var(--glowing-card-backdrop);
            transition: background 0.8s ease, border 0.8s ease, box-shadow 0.8s ease, backdrop-filter 0.8s ease;
        }

        /* 顶部与底部切换按钮配置 */
        .theme-toggle,
        .day-toggle {
            position: absolute;
            width: 24px;
            height: 24px;
            cursor: pointer;
            z-index: 10;
            opacity: 0.5;
            transition: opacity 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .theme-toggle {
            top: 6px;
        }

        .day-toggle {
            bottom: 5px;
        }

        .theme-toggle:hover,
        .day-toggle:hover {
            opacity: 0.7;
        }

        .sun-toggle,
        .day-toggle-left {
            left: 6px;
            transition: transform 0.1s ease;
        }

        .sun-toggle:hover,
        .day-toggle-left:hover {
            transform: scale(1.2);
        }

        .moon-toggle,
        .day-toggle-right {
            right: 6px;
        }

        /* 多页横向滑动滑块基础 */
        .alist-widget-wrapper {
            padding: 20px;
            z-index: 1;
            height: 100%;
            box-sizing: border-box;
        }

        .profile-header {
            padding: 15px 2px 12px;
            position: relative;
        }

        .profile-pic {
            width: 200px;
            height: 200px;
            margin: -60px auto;
            filter: brightness(0.88);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .link-section {
            width: 100%;
            height: 100%;
            overflow: hidden;
            padding: 0;
        }

        .pages {
            display: flex;
            transition: transform 0.5s ease-in-out;
            height: 100%;
            transform: translateX(-100%);
        }

        .page {
            flex: 0 0 100%;
            height: var(--page-height);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0 25px 26px;
            overflow: hidden;
        }

        #page3 {
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        /* 链接卡片 UI */
        .link-card,
        .spotify-card {
            width: 100%;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .link-card {
            display: flex;
            align-items: center;
            max-width: 275px;
            height: 45px;
            background: var(--link-card-bg);
            padding: 8px;
            margin-bottom: 0px;
            border-radius: 20px;
            text-decoration: none;
            color: inherit;
            font-size: 16px;
            font-style: italic;
            border: 1px solid var(--link-card-border);
            box-shadow: var(--link-card-box-shadow);
            transition: background 0.8s ease, border 0.8s ease, box-shadow 0.8s ease;
        }

        .link-card:hover {
            background: var(--link-card-hover-bg);
            transition: background 0.3s ease, border 0.3s ease, box-shadow 0.3s ease;
        }

        .link-icon {
            width: 36px;
            height: 36px;
            margin-left: 16px;
        }

        .link-title {
            text-align: center;
            width: 100%;
            font-size: 18px;
        }

        /* Spotify 卡片样式 */
        .spotify-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 251px;
            height: 160px;
            background: var(--spotify-card-bg);
            border-radius: 25px;
            padding: 10.8px 20px;
            position: relative;
            margin-bottom: 4px;
            flex-wrap: nowrap;
            gap: 16px;
            border: 1.5px solid var(--spotify-card-border);
            box-shadow: var(--spotify-card-box-shadow);
            transition: background 0.8s ease, border 0.8s ease, box-shadow 0.8s ease, transform 0.2s ease;
        }

        .spotify-left {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            flex: 1;
            min-width: 0;
            padding-right: 8px;
            gap: 6px;
        }

        .spotify-meta {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .spotify-icon {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background-color: #1ed760;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .spotify-icon img {
            width: 22px;
            height: 22px;
        }

        .track-text {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 1px;
        }

        .track-title {
            font-size: 16px;
            font-weight: bold;
            margin: 0;
            font-style: italic;
        }

        .track-artist {
            font-size: 11.8px;
            font-style: italic;
        }

        .play-btn {
            background-color: #3fd97a;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 6px 36px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            cursor: pointer;
            margin-top: 1px;
            width: fit-content;
            font-style: italic;
            transition: transform 0.1s ease;
        }

        .play-btn:hover,
        .play-btn:active {
            transform: scale(1.05);
        }

        .play-btn svg {
            width: 14px;
            height: 14px;
        }

        .play-btn .icon-pause {
            display: none;
        }

        .play-btn.playing .icon-play {
            display: none;
        }

        .play-btn.playing .icon-pause {
            display: block;
        }

        .spotify-cover {
            width: 75px;
            height: 75px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .spotify-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #shuicheCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            pointer-events: none;
            display: none;
        }

        /* 底部引导分页小圆点指示器 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: -8px;
            margin-bottom: 10px;
        }

        .bullet {
            width: 85px;
            height: 6px;
            background: var(--fg);
            opacity: 0.2;
            border-radius: 10%;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .bullet::before {
            content: "";
            position: absolute;
            inset: -20px 0;
        }

        .bullet.active {
            opacity: 1;
            background: #c299ff;
            box-shadow: 0px 0px 20px rgba(194, 153, 255, 5);
        }

        /* CRT 扫描线复古显示特效 */
        body:not(.light) .crt::after,
        body:not(.light) .crt::before {
            content: " ";
            display: block;
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }

        body:not(.light) .crt::after {
            background: rgba(18, 16, 16, 0);
            opacity: 0;
        }

        body:not(.light) .crt::before {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 100%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        /* 第一页：垂直内嵌无缝滑动子页面配置 */
        #page1 {
            padding: 0;
        }

        #page1 .page-vertical {
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
            position: relative;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        #page1 .page-vertical::-webkit-scrollbar {
            display: none;
        }

        #page1 .subpage {
            scroll-snap-align: start;
            scroll-snap-stop: always;
            height: 100%;
            min-height: var(--page-height);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #page1,
        #page1 .page-vertical,
        #page1 .subpage {
            overflow-x: hidden;
        }

        .media-wrapper {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .glitch-img {
            max-width: 99.7%;
            max-height: 100%;
            border-radius: 15px;
        }

        .pixel-scale-box {
            width: 200px;
            height: 180px;
            position: relative;
            transform: scale(0.5);
            margin-top: -10px;
            contain: paint;
            will-change: transform;
        }

        /* 赞赏悬停/点击交互区域设置 */
        .reward-wrapper {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-style: italic;
            cursor: pointer;
            position: relative;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .reward-media {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reward-gif {
            max-width: 99.7%;
            max-height: 100%;
            border-radius: 18px;
            transition: opacity 0.5s ease;
            opacity: 1;
        }

        .reward-qr {
            position: absolute;
            width: 340px;
            height: 340px;
            border-radius: 18px;
            transition: opacity 0.5s ease;
            opacity: 0;
            pointer-events: none;
            top: 0px;
        }

        .reward-texts {
            position: relative;
            margin-top: 21px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 32px;
        }

        .reward-text-old {
            position: absolute;
            color: inherit;
            font-size: 24px;
            text-align: center;
            text-decoration: underline;
            margin: 0;
            transition: opacity 0.5s ease;
            opacity: 1;
            white-space: nowrap;
        }

        .reward-text-new {
            position: absolute;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            text-align: center;
            margin-top: -40px;
        }

        .reward-text-new a {
            color: inherit;
            font-size: 24px;
            text-decoration: underline;
            display: block;
            line-height: 1.5;
        }

        .show-qr .reward-gif,
        .show-qr .reward-text-old {
            opacity: 0;
            pointer-events: none;
        }

        .show-qr .reward-qr,
        .show-qr .reward-text-new {
            opacity: 1;
            pointer-events: auto;
        }

        /* 纯 CSS 庞大像素画数据阴影 */
        .pixel-art {
            width: 10px;
            height: 10px;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 110px 10px #000, 120px 10px #000, 110px 20px #000, 110px 30px #000, 110px 40px #000, 120px 40px #000, 130px 40px #000, 140px 40px #000, 150px 40px #000, 160px 40px #000, 30px 50px #000, 70px 50px #000, 160px 50px #000, 30px 60px #000, 40px 60px #000, 60px 60px #000, 70px 60px #000, 100px 60px #000, 110px 60px #000, 120px 60px #000, 130px 60px #000, 160px 60px #000, 30px 70px #000, 40px 70px #000, 50px 70px #000, 60px 70px #000, 70px 70px #000, 90px 70px #000, 100px 70px #000, 110px 70px #000, 120px 70px #000, 130px 70px #000, 140px 70px #000, 150px 70px #000, 160px 70px #000, 30px 80px #000, 40px 80px #f00, 50px 80px #000, 60px 80px #f00, 70px 80px #000, 80px 80px #000, 90px 80px #000, 100px 80px #000, 110px 80px #000, 120px 80px #000, 130px 80px #000, 140px 80px #000, 150px 80px #000, 160px 80px #000, 30px 90px #000, 40px 90px #000, 50px 90px #000, 60px 90px #000, 70px 90px #000, 80px 90px #000, 90px 90px #000, 100px 90px #000, 110px 90px #000, 120px 90px #000, 130px 90px #000, 140px 90px #000, 150px 90px #000, 160px 90px #000, 40px 100px #000, 50px 100px #000, 60px 100px #000, 70px 100px #000, 80px 100px #000, 90px 100px #000, 100px 100px #000, 110px 100px #000, 120px 100px #000, 130px 100px #000, 140px 100px #000, 150px 100px #000, 160px 100px #000, 60px 110px #000, 70px 110px #000, 80px 110px #000, 90px 110px #000, 100px 110px #000, 110px 110px #000, 130px 110px #000, 140px 110px #000, 150px 110px #000, 60px 120px #000, 70px 120px #000, 80px 120px #000, 100px 120px #000, 110px 120px #000, 130px 120px #000, 140px 120px #000, 60px 130px #000, 80px 130px #000, 110px 130px #000, 140px 130px #000, 60px 140px #000, 80px 140px #000, 110px 140px #000, 140px 140px #000, 60px 150px #000, 80px 150px #000, 110px 150px #000, 140px 150px #000, 50px 160px #000, 60px 160px #000, 70px 160px #000, 80px 160px #000, 100px 160px #000, 110px 160px #000, 130px 160px #000, 140px 160px #000;
        }

        /* 外部专属复古字体图标映射系统 */
        @font-face {
            font-family: "icomoon";
            src: url("https://cdn.jsdelivr.net/gh/qxx2000/blog@main/fonts/icomoon.woff") format("woff");
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        [class^="icon-"],
        [class*=" icon-"] {
            font-family: "icomoon" !important;
            font-style: normal;
            font-weight: normal;
            font-variant: normal;
            text-transform: none;
            line-height: 1;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .icon-back:before {
            content: "\e900";
            color: #827d7b;
        }

        .icon-next:before {
            content: "\e901";
            color: #827d7b;
        }

        .icon-pause:before,
        .icon-play:before,
        .icon-playlist:before {
            color: #fff;
        }

        .icon-pause:before {
            content: "\e902";
        }

        .icon-play:before {
            content: "\e903";
        }

        .icon-playlist:before {
            content: "\e904";
        }

        /* 滚动条细部美化与通用工具类 */
        .link-scroll-container,
        .music-player__playlist {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(200, 200, 200, 0.3) transparent;
        }

        .lazy-placeholder {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .img {
            width: 100%;
            flex-shrink: 0;
            display: block;
            object-fit: cover;
        }

        .list {
            margin: 0;
            padding: 0;
            list-style-type: none;
        }

        .text_trsf-cap {
            text-transform: capitalize;
        }

        .button {
            all: unset;
            cursor: pointer;
        }

        .center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flex-row {
            display: flex;
        }

        .flex-column {
            display: flex;
            flex-direction: column;
        }

        ._align_center {
            align-items: center;
        }

        ._justify_space-btwn {
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .text_overflow {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            display: inline-block;
        }

        /* 完善的第3页高级高级音乐播放器底层 UI 样式 */
        .music-player {
            --color-gray: #e5e7ea;
            --color-blue: #78adfe;
            --color-blue-dark: #5781bd;
            --box-shadow: 0 2px 6px 1px #0000001f;
            --cover-size: 4.2em;
            --border-radius: 1.2em;
            --music-player-height: calc(var(--page-height) - 0px);
            --offset-cover: 1em;
            width: 100%;
            max-width: 335px;
            height: 445px;
            user-select: none;

            height: 100%;

    <script>
// --- 全局状态与配置 ---
// 👉 修改这里：根据 body 是否有 light 类名，自动决定一开始要不要开启粒子
window.isParticlesEnabled = !document.body.classList.contains('light');
window.userToggledParticles = false; 
let bgChangeSequence = 0;
let currentPage = 2;
const glowingCard = document.querySelector('.glowing-card');
const audio = document.getElementById('audioPlayer');
let isPlaying = false;

// --- 主题循环配置 ---
const bgPresets =[
    { name: 'light-default', type: 'theme', value: 'light' },
    { name: 'dark-default', type: 'theme', value: 'dark' },
    { name: 'custom-1', type: 'bg', value: 'https://pub-2892a14f8bbf4cd488041657b793ac15.r2.dev/000.jpg' },
    { name: 'custom-2', type: 'bg', value: 'https://cdn.jsdelivr.net/gh/qxx2000/blog@main/img/DDD.webp' }
];
let currentBgIndex = 0;

// --- 核心：粒子状态控制引擎 ---
function updateParticlesDisplay() {
    const canvas = document.getElementById('shuicheCanvas');
    if (!canvas) return;

    if (window.isParticlesEnabled) {
        canvas.style.display = 'block';
        if (window.bgEngine && window.bgEngine.start) window.bgEngine.start();
    } else {
        canvas.style.display = 'none';
        if (window.bgEngine && window.bgEngine.stop) window.bgEngine.stop();
    }
}

// --- [终极核心修复] 单层平滑过渡覆盖逻辑 ---
let bgTransitionTimer = null;
function crossfadeBackground(backgroundValue, isLightTheme) {
    const currentChangeId = ++bgChangeSequence;
    const overlay = document.getElementById('bg-transition-layer');
    if (bgTransitionTimer) clearTimeout(bgTransitionTimer);

    // 解析背景 URL
    const urlMatch = backgroundValue.match(/url\(['"]?(.*?)['"]?\)/);
    const imageUrl = urlMatch ? urlMatch[1] : null;

    const applyEffect = () => {
        if (currentChangeId !== bgChangeSequence) return;

        // 1. 设置过渡层的内容（新背景）
        overlay.style.background = backgroundValue.startsWith('url') ? `${backgroundValue} center/cover fixed` : backgroundValue;

        // 2. 切换 UI 主题样式
        document.body.classList.toggle('light', isLightTheme);
        document.documentElement.style.setProperty('--fg', isLightTheme ? 'black' : '#f0f0f0');

        // 3. 粒子联动
        if (!window.userToggledParticles) window.isParticlesEnabled = !isLightTheme;
        updateParticlesDisplay();

        // 4. 过渡层淡入
        overlay.style.opacity = '1';

        // 5. 动画结束后，同步给 bg-base-layer！(彻底不碰 body 的背景)
        bgTransitionTimer = setTimeout(() => {
            document.getElementById('bg-base-layer').style.background = overlay.style.background;
            
            // 瞬间隐藏覆盖层
            overlay.style.transition = 'none';
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.transition = 'opacity 0.8s ease-in-out';
            }, 50);
            bgTransitionTimer = null;
        }, 850);
    };

    // 如果是图片，确保完全加载后再执行，防止黑屏
    if (imageUrl) {
        const img = new Image();
        img.src = imageUrl;
        img.onload = applyEffect;
        img.onerror = applyEffect;
    } else {
        applyEffect();
    }
}

function toggleTheme(theme) {
    if (theme === 'light') {
        crossfadeBackground("url('https://raw.githubusercontent.com/me2077/me2077.github.io/main/images/AAA.png')", true);
    } else {
        crossfadeBackground("#000", false);
    }
}

function switchBackground(url) {
    crossfadeBackground(`url('${url}')`, true);
}

// --- 手动双击切换粒子逻辑 ---
(function initDoubleClickToggle() {
    let lastToggleTime = 0;
    function toggleParticles(e) {
        let now = new Date().getTime();
        if (now - lastToggleTime < 500) return;
        lastToggleTime = now;
        if (e.target && e.target.closest && e.target.closest('a, button, svg, img, video, .bullet, .link-card, .spotify-card, .play-btn, .theme-toggle, .day-toggle')) {
            return;
        }
        window.isParticlesEnabled = !window.isParticlesEnabled;
        window.userToggledParticles = true;
        updateParticlesDisplay();
    }
    document.addEventListener('dblclick', toggleParticles);
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(e) {
        let now = new Date().getTime();
        if (now - lastTouchEnd <= 400) {
            toggleParticles(e);
            lastTouchEnd = 0;
        } else {
            lastTouchEnd = now;
        }
    });
})();

// --- ThreeJS 星空粒子引擎 ---
// --- ThreeJS 星空粒子引擎 (基于 Delta Time，保证所有浏览器速度绝对一致) ---
(function initBackgroundEngine() {
    const count = 1000; // 换成了新版本要求的 1000 个粒子数量
    let scene, camera, renderer, animationId = null, mouseX = 0, mouseY = 0;
    let windowHalfX = window.innerWidth / 2, windowHalfY = window.innerHeight / 2;
    
    let clock = new THREE.Clock(); // [核心修改] 引入 Three.js 时钟，用于抹平帧率差异
    
    let geometry = new THREE.BufferGeometry();
    let posAttribute = new THREE.BufferAttribute(new Float32Array(6 * count), 3);
    posAttribute.setUsage(THREE.DynamicDrawUsage);
    geometry.setAttribute('position', posAttribute);
    geometry.setAttribute('velocity', new THREE.BufferAttribute(new Float32Array(2 * count), 1));
    let positionArray = posAttribute.array;
    let velocityArray = geometry.getAttribute('velocity').array;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 1, 500);
        camera.position.z = 200;
        renderer = new THREE.WebGLRenderer({
            canvas: document.getElementById('shuicheCanvas'),
            antialias: true,
            alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight, false);
        renderer.setClearColor(0x000000, 0);
        
        for (let index = 0; index < count; index++) {
            const x = Math.random() * 800 - 400, y = Math.random() * 800 - 400, z = Math.random() * 400 - 200;
            positionArray[6 * index] = x; positionArray[6 * index + 1] = y; positionArray[6 * index + 2] = z;
            positionArray[6 * index + 3] = x; positionArray[6 * index + 4] = y; positionArray[6 * index + 5] = z;
        }
        scene.add(new THREE.LineSegments(geometry, new THREE.LineBasicMaterial({ color: 0xffffff })));
        
        window.addEventListener('resize', debounceResize, { passive: true });
        document.body.addEventListener('pointermove', e => {
            mouseX = e.clientX - windowHalfX; mouseY = e.clientY - windowHalfY;
        }, { passive: true });
        
        if (window.isParticlesEnabled) {
            clock.start(); // 引擎启动时同步启动时钟
            anime();
        }
    }

    let resizeTimeout;
    function debounceResize() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            windowHalfX = window.innerWidth / 2; windowHalfY = window.innerHeight / 2;
        }, 100);
    }

    function anime() {
        // [核心修改] 获取两帧之间的时间差 (Delta Time)
        let delta = clock.getDelta();
        delta = Math.min(delta, 0.1); // 防止切换标签页后 delta 过大导致粒子乱飞
        const timeScale = delta / (1 / 60); // 强制以 60FPS 为基准比例计算

        for (let index = 0; index < count; index++) {
            velocityArray[2 * index] += 0.015 * timeScale;
            velocityArray[2 * index + 1] += 0.015 * timeScale;
            positionArray[6 * index + 2] += (velocityArray[2 * index] + 0.03) * timeScale;
            positionArray[6 * index + 5] += velocityArray[2 * index + 1] * timeScale;
            
            if (positionArray[6 * index + 2] > 200) {
                let z = Math.random() * 200 - 200;
                positionArray[6 * index + 2] = z; positionArray[6 * index + 5] = z;
                velocityArray[2 * index] = 0; velocityArray[2 * index + 1] = 0;
            }
        }
        posAttribute.needsUpdate = true;
        
        camera.position.x += (-mouseX * 0.1 - camera.position.x) * 0.02;
        camera.position.y += (-mouseY * 0.1 - camera.position.y) * 0.02;
        camera.lookAt(scene.position);
        renderer.render(scene, camera);
        animationId = requestAnimationFrame(anime);
    }

    document.addEventListener("visibilitychange", () => {
        if (document.hidden && animationId !== null) {
            cancelAnimationFrame(animationId); animationId = null;
        } else if (!document.hidden && animationId === null && window.isParticlesEnabled) {
            clock.start(); // [关键点] 页面切回来时必须重置时钟
            anime();
        }
    });

    window.bgEngine = {
        start: () => { 
            if (animationId === null) {
                clock.start();
                anime(); 
            }
        },
        stop: () => { 
            if (animationId !== null) { 
                cancelAnimationFrame(animationId); 
                animationId = null; 
            } 
        }
    };
    window.bgRenderer = { setClearColor: (c, a) => renderer.setClearColor(c, a) };
    window.addEventListener('DOMContentLoaded', init);
})();

function loadMusicPlayer() {
    let indexSong = 0;
    let pendingCurrentTime = 0;
    let isLocked = false;

    let selectedSong = null;
    let songIsPlayed = false;

    const root = document.querySelector("#root");

    window.musicControls = {
        playPause: handlePlayMusic,
        next: () => handleChangeMusic({ isPrev: false }),
        prev: () => handleChangeMusic({ isPrev: true })
    };

    function savePlaybackState() {
        if (!selectedSong) return;
        const playbackState = {
            currentSongIndex: indexSong,
            isPlaying: !selectedSong.paused,
            volume: selectedSong.volume,
            currentTime: pendingCurrentTime > 0 ? pendingCurrentTime : selectedSong.currentTime
        };
        localStorage.setItem('musicPlayerState', JSON.stringify(playbackState));
    }

    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') savePlaybackState(); });
    window.addEventListener('beforeunload', savePlaybackState);
    setInterval(savePlaybackState, 5000);

    function updateUIForSong(index) {
        updateInfo(songName_elmnt, songs[index].songName);
        updateInfo(singerName_elmnt, songs[index].artist);
        setProperty(sliderImgs_elmnt, "--index", -index);
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: songs[index].songName,
                artist: songs[index].artist,
                artwork:[{ src: songs[index].files.cover, sizes: '512x512', type: 'image/jpeg' }]
            });
        }
    }

    function restorePlaybackState() {
        try {
            const savedState = localStorage.getItem('musicPlayerState');
            if (!savedState) { updateUIForSong(0); return; }
            const playbackState = JSON.parse(savedState);
            if (playbackState.currentSongIndex !== undefined && playbackState.currentSongIndex >= 0 && playbackState.currentSongIndex <= songsLength) {
                indexSong = playbackState.currentSongIndex;
                if (playbackState.currentTime !== undefined) pendingCurrentTime = playbackState.currentTime;
                if (playbackState.volume !== undefined) mainAudio.volume = playbackState.volume;
                updateUIForSong(indexSong);
            } else { updateUIForSong(0); }
        } catch (e) { updateUIForSong(0); }
    }

    function preloadNextSongHead(nextIndex) {
        if (!songs[nextIndex] || !songs[nextIndex].files.song) return;
        const nextUrl = songs[nextIndex].files.song;
        if (preloadAbortController) preloadAbortController.abort();
        preloadAbortController = new AbortController();
        fetch(nextUrl, { headers: { 'Range': 'bytes=0-524288' }, signal: preloadAbortController.signal }).catch(err => {});
    }

    function handleChangeMusic({ isPrev = false, playListIndex = null }) {
        if (isLocked) return;
        let newIndex = playListIndex !== null ? playListIndex : (isPrev ? indexSong - 1 : indexSong + 1);
        if (newIndex < 0) newIndex = songsLength;
        if (newIndex > songsLength) newIndex = 0;
        if (newIndex === indexSong && playListIndex === null) return;

        let wasPlaying = songIsPlayed;
        isSwitchingMusic = true;
        indexSong = newIndex;
        pendingCurrentTime = 0;
        updateUIForSong(indexSong);
        mainAudio.src = songs[indexSong].files.song;

        if (wasPlaying) {
            let playPromise = mainAudio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => { isSwitchingMusic = false; }).catch(e => {
                    isSwitchingMusic = false; songIsPlayed = false;
                    broadcastGuarantor_elmnt.classList.remove("click");
                });
            }
            songIsPlayed = true;
            broadcastGuarantor_elmnt.classList.add("click");
            preloadNextSongHead((indexSong + 1) > songsLength ? 0 : indexSong + 1);
        } else {
            isSwitchingMusic = false;
            if (preloadAbortController) preloadAbortController.abort();
        }
        savePlaybackState();
    }

    function handlePlayMusic() {
        if (mainAudio.currentTime === mainAudio.duration && mainAudio.duration > 0) {
            handleChangeMusic({}); return;
        }
        if (!mainAudio.src || mainAudio.src === window.location.href || mainAudio.src === "") {
            mainAudio.src = songs[indexSong].files.song;
            mainAudio.play();
            songIsPlayed = true;
            broadcastGuarantor_elmnt.classList.add("click");
            preloadNextSongHead((indexSong + 1) > songsLength ? 0 : indexSong + 1);
        } else {
            if (mainAudio.paused) {
                mainAudio.play();
                preloadNextSongHead((indexSong + 1) > songsLength ? 0 : indexSong + 1);
            } else { mainAudio.pause(); }
        }
    }

    function updateTheProgressBar() {

    function syncMediaSessionPosition() {

// --- 全局键盘控制系统 ---
function initKeyboardControls() {
    document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        
        if (key === 't') {
            currentBgIndex = (currentBgIndex + 1) % bgPresets.length;
            const preset = bgPresets[currentBgIndex];
            if (preset.type === 'theme') toggleTheme(preset.value);
            else switchBackground(preset.value);
        }

        if (key === '1') { toggleTheme('light'); currentBgIndex = 0; }
        if (key === '2') { toggleTheme('dark'); currentBgIndex = 1; }
        if (key === '3') { switchBackground('https://pub-2892a14f8bbf4cd488041657b793ac15.r2.dev/000.jpg'); currentBgIndex = 2; }
        if (key === '4') { switchBackground('https://cdn.jsdelivr.net/gh/qxx2000/blog@main/img/DDD.webp'); currentBgIndex = 3; }

        if (key === 'p') {
            window.isParticlesEnabled = !window.isParticlesEnabled;
            window.userToggledParticles = true;
            updateParticlesDisplay();
        }

        if (!e.shiftKey) {
            if (e.key === 'ArrowRight') {
                let next = currentPage + 1;
                if (next > 3) next = 1;
                switchPageTo(next);
            }
            if (e.key === 'ArrowLeft') {
                let prev = currentPage - 1;
                if (prev < 1) prev = 3;
                switchPageTo(prev);
            }
        }

        if (window.musicControls) {
            if (e.code === 'Space') {
                e.preventDefault();
                window.musicControls.playPause();
            }
            if (e.shiftKey) {
                if (e.key === 'ArrowRight') window.musicControls.next();
                if (e.key === 'ArrowLeft') window.musicControls.prev();
            }
        }
    });
}

    scrollContainer.addEventListener('scroll', () => {
        scrollContainer.classList.add('scrolling');
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => scrollContainer.classList.remove('scrolling'), 1500);
    }, { passive: true });
}

let avatarSound = null;

async function initAvatarSound() {
    const audioUrl = "https://cdn.jsdelivr.net/gh/qxx2000/blog@main/img/Cat.wav";
    try {
        // 添加 { cache: 'force-cache' } 强制浏览器使用本地缓存，拒绝二次网络请求
        const response = await fetch(audioUrl, { cache: 'force-cache' });
        const audioBlob = await response.blob();
        const blobUrl = URL.createObjectURL(audioBlob);
        avatarSound = new Audio(blobUrl);
        avatarSound.volume = 0.35;
    } catch (error) {
        avatarSound = new Audio(audioUrl);
        avatarSound.volume = 0.35;
    }
}

// 利用浏览器的空闲时间 (Idle Time) 预加载音频
// 兼容 Safari 等不支持 requestIdleCallback 的浏览器则使用 setTimeout 延迟加载
if ('requestIdleCallback' in window) {
    requestIdleCallback(() => initAvatarSound());
} else {
    setTimeout(initAvatarSound, 1500); 
}

function triggerConfetti() {
    if (typeof confetti === 'function') confetti({ particleCount: 150, spread: 100 });
    // 增加判空保护，并把时间重置为0以便双击时能连续发声
    if (avatarSound) {
        avatarSound.currentTime = 0; 
        avatarSound.play().catch(e => console.log(e));
    }
}

function toggleReward() { document.getElementById('rewardContainer').classList.toggle('show-qr'); }

if (typeof ClipboardJS !== 'undefined') {
    var clipboard = new ClipboardJS('#wechatBtn', { text: () => "lllIIllIIlIII" });
    clipboard.on('success', () => { alert('👉微信号复制成功,即将前往微信！'); window.location.href = 'wechat://'; });
}

const video = document.getElementById('page1Video');
let videoLoaded = false;
if ('IntersectionObserver' in window && video) {
    const videoObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                if (!videoLoaded) { video.src = "https://cdn.jsdelivr.net/gh/qxx2000/blog@main/music/Movie.MP4"; videoLoaded = true; }
                video.muted = true; video.play().catch(() => {});
            } else { video.pause(); }
        });
    }, { threshold: 0.5 });
    videoObserver.observe(document.getElementById('page1-5'));
}
if(video) video.addEventListener('click', () => video.muted = false);

window.onload = function() {
    loadMusicPlayer();
    initKeyboardControls();
    if (document.body.classList.contains('light')) {
        window.isParticlesEnabled = false;
        updateParticlesDisplay();
    }
    switchPageTo(2);
};

// 按钮动效
document.querySelectorAll('.theme-toggle, .day-toggle').forEach(button => {
    button.addEventListener('mouseenter', function() { this.style.transform = 'scale(1.2)'; });
    button.addEventListener('mouseleave', function() { this.style.transform = 'scale(1)'; });
    button.addEventListener('click', function() { setTimeout(() => { this.style.transform = 'scale(1)'; }, 350); });
});
