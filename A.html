    <style>
        :root {
            --glow-sens: 30;
            --dark: hsl(260, 25%, 10%);
            --fg: black;
            --h: 260;
            --card-bg: linear-gradient(8deg, var(--dark) 75%, color-mix(in hsl, var(--dark), white 2.5%) 75.5%);
            --blend: soft-light;
            --glow-blend: plus-lighter;
            --glow-color: 40deg 80% 80%;
            --duration: 1s;
            --ease-slider: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-timeline: cubic-bezier(0.71, 0.21, 0.3, 0.95);
            --page-height: 498px;
            --accent: hsl(260, 100%, 80%);
            --glowing-card-bg: rgb(255 255 255 / 15%);
            --glowing-card-border: rgb(255 255 255 / 70%);
            --glowing-card-backdrop: blur(7px);
            --link-card-bg: rgb(255 255 255 / 9%);
            --link-card-hover-bg: rgb(255 255 255 / 25%);
            --link-card-border: rgb(255 255 255 / 40%);
            --link-card-box-shadow: 0px 4px 3px #0001, 0 0 35px #fffa inset;
            --spotify-card-bg: rgb(255 255 255 / 15%);
            --spotify-card-border: rgb(255 255 255 / 45%);
            --spotify-card-box-shadow: 0px 4px 3px #0001, 0 0 38px #fffa inset;
            --music-player-bg: rgb(255 255 255 / 15%);
            --music-player-shadow: none;
        }

        .light {
            --card-bg: linear-gradient(8deg, color-mix(in hsl, hsl(260, 25%, 95%), var(--dark) 2.5%) 75%, hsl(260, 25%, 95%) 75.5%);
            --blend: darken;
            --glow-blend: luminosity;
            --glow-color: 280deg 90% 95%;
            --glowing-card-bg: rgb(255 255 255 / 13%);
            --glowing-card-border: rgb(255 255 255 / 80%);
            --glowing-card-backdrop: blur(7px);
            --link-card-bg: rgb(255 255 255 / 7%);
            --link-card-hover-bg: rgb(255 255 255 / 25%);
            --link-card-border: rgb(255 255 255 / 45%);
            --link-card-box-shadow: 0px 4px 3px #0001, 0 0 25px #fffa inset;
            --spotify-card-bg: rgb(255 255 255 / 7%);
            --spotify-card-border: rgb(255 255 255 / 60%);
            --spotify-card-box-shadow: 0px 4px 3px #0001, 0 0 38px #fffa inset;
            --music-player-bg: rgb(255 255 255 / 10%);
            --music-player-shadow: 0 2px 6px 1px #0000001f;
        }

        body {
            background-color: #000000 !important;
            background-image: none !important;
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: var(--fg);
            overflow: hidden;
            touch-action: manipulation;
            transition: color 0.8s ease;
        }

        body::before, body::after {
            content: "";
            position: fixed;
            left: 0; right: 0;
            background-color: #000000;
            z-index: 99999;
            pointer-events: none;
        }
        body::before { top: 0; height: env(safe-area-inset-top); }
        body::after { bottom: 0; height: env(safe-area-inset-bottom); }

        #bg-container {
            position: fixed; inset: 0; z-index: -3; pointer-events: none; contain: strict; 
        }

        .bg-layer {
            position: absolute; inset: 0; background-size: cover; background-position: center;
            opacity: 0; transition: opacity 0.8s ease-in-out; transform: translateZ(0);
            will-change: opacity; contain: strict;
        }

        canvas { position: fixed; inset: 0; width: 100%; height: 100dvh; z-index: -1; }

        .glowing-card {
            position: relative; width: 100%; max-width: 345px; height: 510px; flex-shrink: 0;
            border-radius: 20px; isolation: isolate; transform: translateZ(0);
            background: var(--glowing-card-bg); box-shadow: 0px 10px 15px transparent, 0 0 55px #fff inset;
            overflow: hidden; text-align: center; box-sizing: border-box;
            border: 1px solid var(--glowing-card-border);
            -webkit-backdrop-filter: var(--glowing-card-backdrop);
            backdrop-filter: var(--glowing-card-backdrop);
            transition: background 0.8s ease, border 0.8s ease, box-shadow 0.8s ease;
            will-change: background, box-shadow, border;
        }

        .theme-toggle, .day-toggle {
            position: absolute; width: 24px; height: 24px; cursor: pointer; z-index: 10;
            opacity: 0.5; transition: opacity 0.3s, transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .theme-toggle { top: 6px; }
        .day-toggle { bottom: 5px; }
        .sun-toggle, .day-toggle-left { left: 6px; }
        .moon-toggle, .day-toggle-right { right: 6px; }

        @media (hover: hover) { .theme-toggle:hover, .day-toggle:hover { opacity: 0.7; transform: scale(1.2); } }
        .theme-toggle:active, .day-toggle:active { opacity: 0.7; }
        .icon-scale-active { transform: scale(1.2) !important; opacity: 0.7 !important; }
        .icon-shrink-force { transform: scale(1) !important; }

        .alist-widget-wrapper { padding: 20px; z-index: 1; height: 100%; box-sizing: border-box; }
        .profile-header { padding: 15px 2px 12px; position: relative; }
        .profile-pic { width: 200px; height: 200px; margin: -60px auto; filter: brightness(0.88); cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .link-section { width: 100%; height: 100%; overflow: hidden; padding: 0; }
        .pages { display: flex; transition: transform 0.5s ease-in-out; height: 100%; transform: translateX(-100%); }

        .page {
            flex: 0 0 100%; height: var(--page-height); box-sizing: border-box; display: flex;
            flex-direction: column; justify-content: space-between; padding: 0 25px 25px;
            overflow: hidden; contain: paint layout; 
        }

        #page3 { justify-content: center; align-items: center; padding: 0; }

        .link-card, .spotify-card {
            width: 100%; cursor: pointer; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .link-card {
            display: flex; align-items: center; max-width: 275px; height: 45px;
            background: var(--link-card-bg); padding: 8px; margin-bottom: 0px; border-radius: 20px;
            text-decoration: none; color: inherit; font-size: 16px; font-style: italic;
            border: 1px solid var(--link-card-border); box-shadow: var(--link-card-box-shadow);
            transition: background 0.8s ease, border 0.8s ease, box-shadow 0.8s ease;
        }

        .link-card:hover { background: var(--link-card-hover-bg); transition: background 0.3s ease, border 0.3s ease, box-shadow 0.3s ease; }
        .link-icon { width: 36px; height: 36px; margin-left: 16px; }
        .link-title { text-align: center; width: 100%; font-size: 18px; }

        .spotify-card {
            display: flex; justify-content: space-between; align-items: center; max-width: 251px;
            height: 160px; background: var(--spotify-card-bg); border-radius: 25px; padding: 10.8px 20px;

        .spotify-left { display: flex; flex-direction: column; justify-content: flex-start; flex: 1; min-width: 0; padding-right: 8px; gap: 6px; }
        .spotify-meta { display: flex; align-items: center; gap: 6px; }

        .spotify-icon img { width: 22px; height: 22px; }
        .track-text { display: flex; flex-direction: column; text-align: left; gap: 1px; }
        .track-title { font-size: 16px; font-weight: bold; margin: 0; font-style: italic; }
        .track-artist { font-size: 11.8px; font-style: italic; }

        .play-btn {
            background-color: #3fd97a; color: white; border: none; border-radius: 24px; padding: 6px 36px;
            font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: flex-start;
            gap: 6px; cursor: pointer; margin-top: 1px; width: fit-content; font-style: italic; transition: transform 0.1s ease;
        }

        .play-btn:hover, .play-btn:active { transform: scale(1.05); }
        .play-btn svg { width: 14px; height: 14px; }
        .play-btn .icon-pause { display: none; }
        .play-btn.playing .icon-play { display: none; }
        .play-btn.playing .icon-pause { display: block; }

        .spotify-cover { width: 75px; height: 75px; border-radius: 12px; overflow: hidden; flex-shrink: 0; margin-left: 8px; }
        .spotify-cover img { width: 100%; height: 100%; object-fit: cover; }
        #shuicheCanvas { position: fixed; top: 0; left: 0; z-index: 9999; pointer-events: none; display: none; }
        .pagination { display: flex; justify-content: center; gap: 5px; margin-top: -8px; margin-bottom: 10px; }
        .bullet { width: 85px; height: 6px; background: var(--fg); opacity: 0.2; border-radius: 10%; cursor: pointer; transition: all 0.3s; position: relative; }
        .bullet::before { content: ""; position: absolute; inset: -20px 0; }
        .bullet.active { opacity: 1; background: #c299ff; box-shadow: 0px 0px 20px rgba(194, 153, 255, 5); }

        body:not(.light) .crt::after, body:not(.light) .crt::before {
            content: " "; display: block; position: fixed; inset: 0; pointer-events: none; z-index: 2;
        }
        body:not(.light) .crt::after { background: rgba(18, 16, 16, 0); opacity: 0; }
        body:not(.light) .crt::before {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 100%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        #page1 { padding: 0; }
        #page1 .page-vertical { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; scroll-snap-type: y mandatory; scroll-behavior: smooth; overscroll-behavior: contain; position: relative; -ms-overflow-style: none; scrollbar-width: none; }
        #page1 .page-vertical::-webkit-scrollbar { display: none; }
        #page1 .subpage { scroll-snap-align: start; scroll-snap-stop: always; height: 100%; min-height: var(--page-height); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #page1, #page1 .page-vertical, #page1 .subpage { overflow-x: hidden; }

        .media-wrapper { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        .glitch-img { max-width: 99.7%; max-height: 100%; border-radius: 15px; }
        .pixel-scale-box { width: 200px; height: 180px; position: relative; transform: scale(0.5); margin-top: -10px; contain: paint; will-change: transform; }

        .reward-wrapper { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; font-style: italic; cursor: pointer; position: relative; width: 100%; -webkit-tap-highlight-color: transparent; }
        .reward-media { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; }
        .reward-gif { max-width: 99.7%; max-height: 100%; border-radius: 18px; transition: opacity 0.5s ease; opacity: 1; }
        .reward-qr { position: absolute; width: 340px; height: 340px; border-radius: 18px; transition: opacity 0.5s ease; opacity: 0; pointer-events: none; top: 0px; }
        .reward-texts { position: relative; margin-top: 21px; display: flex; justify-content: center; align-items: center; width: 100%; height: 32px; }
        .reward-text-old { position: absolute; color: inherit; font-size: 24px; text-align: center; text-decoration: underline; margin: 0; transition: opacity 0.5s ease; opacity: 1; white-space: nowrap; }
        .reward-text-new { position: absolute; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; text-align: center; margin-top: -40px; }
        .reward-text-new a { color: inherit; font-size: 24px; text-decoration: underline; display: block; line-height: 1.5; }
        .show-qr .reward-gif, .show-qr .reward-text-old { opacity: 0; pointer-events: none; }
        .show-qr .reward-qr, .show-qr .reward-text-new { opacity: 1; pointer-events: auto; }

        .pixel-art {
            width: 10px; height: 10px; position: absolute; top: 0; left: 0;
            box-shadow: 110px 10px #000, 120px 10px #000, 110px 20px #000, 110px 30px #000, 110px 40px #000, 120px 40px #000, 130px 40px #000, 140px 40px #000, 150px 40px #000, 160px 40px #000, 30px 50px #000, 70px 50px #000, 160px 50px #000, 30px 60px #000, 40px 60px #000, 60px 60px #000, 70px 60px #000, 100px 60px #000, 110px 60px #000, 120px 60px #000, 130px 60px #000, 160px 60px #000, 30px 70px #000, 40px 70px #000, 50px 70px #000, 60px 70px #000, 70px 70px #000, 90px 70px #000, 100px 70px #000, 110px 70px #000, 120px 70px #000, 130px 70px #000, 140px 70px #000, 150px 70px #000, 160px 70px #000, 30px 80px #000, 40px 80px #f00, 50px 80px #000, 60px 80px #f00, 70px 80px #000, 80px 80px #000, 90px 80px #000, 100px 80px #000, 110px 80px #000, 120px 80px #000, 130px 80px #000, 140px 80px #000, 150px 80px #000, 160px 80px #000, 30px 90px #000, 40px 90px #000, 50px 90px #000, 60px 90px #000, 70px 90px #000, 80px 90px #000, 90px 90px #000, 100px 90px #000, 110px 90px #000, 120px 90px #000, 130px 90px #000, 140px 90px #000, 150px 90px #000, 160px 90px #000, 40px 100px #000, 50px 100px #000, 60px 100px #000, 70px 100px #000, 80px 100px #000, 90px 100px #000, 100px 100px #000, 110px 100px #000, 120px 100px #000, 130px 100px #000, 140px 100px #000, 150px 100px #000, 160px 100px #000, 60px 110px #000, 70px 110px #000, 80px 110px #000, 90px 110px #000, 100px 110px #000, 110px 110px #000, 130px 110px #000, 140px 110px #000, 150px 110px #000, 60px 120px #000, 70px 120px #000, 80px 120px #000, 100px 120px #000, 110px 120px #000, 130px 120px #000, 140px 120px #000, 60px 130px #000, 80px 130px #000, 110px 130px #000, 140px 130px #000, 60px 140px #000, 80px 140px #000, 110px 140px #000, 140px 140px #000, 60px 150px #000, 80px 150px #000, 110px 150px #000, 140px 150px #000, 50px 160px #000, 60px 160px #000, 70px 160px #000, 80px 160px #000, 100px 160px #000, 110px 160px #000, 130px 160px #000, 140px 160px #000;

        @font-face {
            font-family: "icomoon";
            src: url("https://cdn.jsdelivr.net/gh/qxx2000/blog@main/fonts/icomoon.woff") format("woff");
            font-weight: normal; font-style: normal; font-display: swap;
        }

        [class^="icon-"], [class*=" icon-"] {
            font-family: "icomoon" !important; font-style: normal; font-weight: normal; font-variant: normal;
            text-transform: none; line-height: 1; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }

        .icon-back:before { content: "\e900"; color: #827d7b; }
        .icon-next:before { content: "\e901"; color: #827d7b; }
        .icon-pause:before, .icon-play:before, .icon-playlist:before { color: #fff; }
        .icon-pause:before { content: "\e902"; }
        .icon-play:before { content: "\e903"; }
        .icon-playlist:before { content: "\e904"; }

        .lazy-placeholder { background-color: rgba(255, 255, 255, 0.1); }
        .img { width: 100%; flex-shrink: 0; display: block; object-fit: cover; }
        .list { margin: 0; padding: 0; list-style-type: none; }
        .text_trsf-cap { text-transform: capitalize; }
        .button { all: unset; cursor: pointer; }
        .center { display: flex; align-items: center; justify-content: center; }
        .flex-row { display: flex; }
        .flex-column { display: flex; flex-direction: column; }
        ._align_center { align-items: center; }
        ._justify_space-btwn { justify-content: space-between; align-items: center; width: 100%; }
        .text_overflow { flex: 1; min-width: 0; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; display: inline-block; }

        .music-player {
            --color-gray: #e5e7ea; --color-blue: #78adfe; --color-blue-dark: #5781bd;
            --box-shadow: 0 2px 6px 1px #0000001f; --cover-size: 4.2em; --border-radius: 1.2em;
            --music-player-height: calc(var(--page-height) - 0px); --offset-cover: 1em;
            width: 100%; max-width: 335px; height: 445px; -webkit-user-select: none; user-select: none;
            border-radius: var(--border-radius); background-color: var(--music-player-bg);
            margin: -15px auto 0; box-sizing: border-box; color: inherit; transition: background-color 0.8s ease;
        }

        .slider { --shadow-opacity: 1; z-index: 0; flex-shrink: 0; height: 6.8em; position: relative; border-radius: inherit; transition: var(--duration) height var(--ease-timeline); }
        .slider.resize { --shadow-opacity: 0; height: var(--music-player-height); }
        .slider::after { content: ""; position: absolute; inset: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; border-radius: inherit; box-shadow: var(--box-shadow); opacity: var(--shadow-opacity); transition: opacity var(--duration) ease, box-shadow 0.8s ease; }
        .slider__content { position: absolute; top: 0; left: 0; overflow: hidden; border-radius: inherit; width: var(--cover-size); height: var(--cover-size); transition: transform var(--duration) var(--ease-timeline), width var(--duration) var(--ease-timeline), height var(--duration) var(--ease-timeline); transform: translate3d(var(--offset-cover), var(--offset-cover), 0); }
        .slider.resize .slider__content { width: 100%; height: 22em; transform: translate3d(0, 0, 0); }
        .slider__content .button { --size: 2.5em; z-index: 1; position: absolute; width: var(--size); height: var(--size); }
        .slider__content i { position: absolute; pointer-events: none; font-size: var(--size); }

        .music-player__playlist-button { top: 5.5%; left: 5.5%; transform: scale(0); transition: calc(var(--duration) / 2) transform; }
        .slider.resize .music-player__playlist-button { transform: scale(1); transition: 0.30s var(--duration) transform cubic-bezier(0, 0.85, 0.11, 1.64); }
        .music-player__broadcast-guarantor { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .music-player__broadcast-guarantor .icon-pause, .music-player__broadcast-guarantor.click .icon-play { opacity: 0; }
        .music-player__broadcast-guarantor.click .icon-pause { opacity: 1; }
        .slider__imgs { width: 100%; height: 100%; filter: brightness(75%); transform: translate3d(calc(var(--index) * 100%), 0, 0); transition: var(--duration) transform var(--ease-slider); }
        .slider__imgs>img { pointer-events: none; }

        .slider__controls { --controls-y: 210%; --controls-x: 17.3%; --controls-width: 68.4%; --controls-resize-width: 88%; gap: 0.375em 0; flex-wrap: wrap; position: absolute; align-items: center; padding-top: 0.375em; width: var(--controls-width); transform: translate3d(var(--controls-x), 0, 0); animation: var(--controls-animate, "down paused") var(--duration) var(--ease-timeline) forwards; }
        @keyframes down { 100% { width: var(--controls-resize-width); transform: translate3d(0, var(--controls-y), 0); } }
        @keyframes up { 0% { width: var(--controls-resize-width); transform: translate3d(0, var(--controls-y), 0); } 100% { width: var(--controls-width); transform: translate3d(var(--controls-x), 0, 0); } }

        .slider__switch-button { font-size: 2.5em; height: max-content; }
        .music-player__info { width: 56.3%; cursor: pointer; line-height: 1.45; overflow: hidden; font-weight: bold; padding: 0 0.0625em; white-space: nowrap; }
        .music-player__info>* { margin: 0 auto; pointer-events: none; }
        .music-player__singer-name { font-size: 1.1em; width: max-content; }
        .music-player__subtitle { font-size: 0.8em; font-weight: bold; color: inherit; opacity: 0.55; }
        .slider__controls .music-player__subtitle { width: max-content; }
        .music-player__singer-name.animate, .music-player__subtitle.animate { --subtitle-gap: 1.2em; display: flex; gap: 0 var(--subtitle-gap); animation: subtitle 12s 1.2s linear infinite; }
        @keyframes subtitle { 80%, 100% { transform: translate3d(calc((100% + var(--subtitle-gap)) / -2), 0, 0); } }

        .progress { width: 90%; height: 0.6em; cursor: pointer; transition: var(--duration) width var(--ease-timeline); position: relative; top: 8px; }
        .slider.resize .progress { width: 100%; }
        .progress__wrapper { width: 100%; height: 0.35em; position: relative; border-radius: 1em; background-color: var(--color-gray); }
        .progress__bar { top: 0; left: 0; bottom: 0; position: absolute; width: 100%; border-radius: inherit; background-color: var(--color-blue); transform: scaleX(var(--scale, 0)); transform-origin: left; will-change: transform; }
        .progress__dot { --size: 0.375em; position: absolute; top: 50%; left: var(--width, 0%); width: var(--size); height: var(--size); background-color: var(--color-blue-dark); border-radius: 100%; transform: translate(-50%, -50%); will-change: left; }

        .link-scroll-container { position: relative; width: 320px; }
        .music-player__playlist { box-sizing: border-box; height: calc(100% - 6.8em); padding: 10px 0.9em 0 var(--offset-cover) !important; overflow-y: auto; }
        .link-scroll-container::-webkit-scrollbar, .music-player__playlist::-webkit-scrollbar { width: 4px; background: transparent; }

function updateParticlesDisplay() {
    const canvas = document.getElementById('shuicheCanvas');
    if (!canvas) return;
    if (window.isParticlesEnabled) {
        canvas.style.display = 'block';
        if (window.bgEngine && window.bgEngine.start) window.bgEngine.start();
    } else {
        canvas.style.display = 'none';
        if (window.bgEngine && window.bgEngine.stop) window.bgEngine.stop();
    }
}

let bgLayerIndex = 0; 
function crossfadeBackground(backgroundValue, isLightTheme) {
    const currentChangeId = ++bgChangeSequence;
    const container = document.getElementById('bg-container');
    if (!container) return;

    const urlMatch = backgroundValue.match(/url\(['"]?(.*?)['"]?\)/);
    const imageUrl = urlMatch ? urlMatch[1] : null;

    const applyEffect = () => {
        if (currentChangeId !== bgChangeSequence) return;
        bgLayerIndex++; 
        const newLayer = document.createElement('div');
        newLayer.className = 'bg-layer';
        newLayer.style.zIndex = bgLayerIndex;
        newLayer.style.background = backgroundValue.startsWith('url') ? `${backgroundValue} center/cover` : backgroundValue;
        container.appendChild(newLayer);
        void newLayer.offsetWidth;

        document.body.classList.toggle('light', isLightTheme);
        document.documentElement.style.setProperty('--fg', isLightTheme ? 'black' : '#f0f0f0');

        if (!window.userToggledParticles) window.isParticlesEnabled = !isLightTheme;
        if (!window.isParticlesEnabled) updateParticlesDisplay();

        requestAnimationFrame(() => { newLayer.style.opacity = '1'; });

        setTimeout(() => {
            if (currentChangeId !== bgChangeSequence) return; 
            const layers = container.querySelectorAll('.bg-layer');
            layers.forEach(layer => { if (layer !== newLayer) layer.remove(); });
            if (window.isParticlesEnabled) updateParticlesDisplay();
        }, 850);
    };

    if (imageUrl) {
        const img = new Image();
        img.src = imageUrl;
        img.onload = applyEffect;
        img.onerror = applyEffect;
    } else { applyEffect(); }
}

function switchBackground(value, isLight = true) {
    if (value.includes('gradient') || /^(#|rgb|hsl)/.test(value.trim())) { crossfadeBackground(value, isLight); } 
    else { crossfadeBackground(`url('${value}')`, isLight); }
}

(function initDoubleClickToggle() {
    let lastToggleTime = 0;
    function toggleParticles(e) {
        let now = new Date().getTime();
        if (now - lastToggleTime < 500) return;
        lastToggleTime = now;
        if (e.target && e.target.closest && e.target.closest('#oneko, #oneko-skin-menu, a, button, svg, img, video, .bullet, .link-card, .spotify-card, .play-btn, .theme-toggle, .day-toggle')) { return; }
        window.isParticlesEnabled = !window.isParticlesEnabled;
        window.userToggledParticles = true;
        updateParticlesDisplay();
    }
    document.addEventListener('dblclick', toggleParticles);
    
    let lastTouchEnd = 0;
    let isMultiTouch = false;

    // 1. 监听手指按下：只要屏幕上超过1根手指，就标记为“多指/缩放操作”
    document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) {
            isMultiTouch = true;
        }
    }, { passive: true });

    // 2. 监听手指离开
    document.addEventListener('touchend', function(e) {
        // 如果屏幕上还有手指没离开，说明这不是一次完整的单指点击，直接忽略
        if (e.touches.length > 0) return;
        
        // 如果刚刚经历过多指操作（双指缩放、双指点击等），结束并重置状态，不触发双击
        if (isMultiTouch) {
            isMultiTouch = false;
            lastTouchEnd = 0; 
            return;
        }

        // 纯净的单指双击判断逻辑
        let now = new Date().getTime();
        if (now - lastTouchEnd <= 400) { 
            toggleParticles(e); 
            lastTouchEnd = 0; 
        } else { 
            lastTouchEnd = now; 
        }
    });
})();

(function initBackgroundEngine() {
    const count = 1000; 
    let scene, camera, renderer, animationId = null, mouseX = 0, mouseY = 0;
    let windowHalfX = window.innerWidth / 2, windowHalfY = window.innerHeight / 2;
    let clock, geometry, posAttribute, positionArray, velocityArray;

    function init() {
        if (typeof THREE === 'undefined') { setTimeout(init, 50); return; }
        clock = new THREE.Clock(); 
        geometry = new THREE.BufferGeometry();
        posAttribute = new THREE.BufferAttribute(new Float32Array(6 * count), 3);
        posAttribute.setUsage(THREE.DynamicDrawUsage);
        geometry.setAttribute('position', posAttribute);
        geometry.setAttribute('velocity', new THREE.BufferAttribute(new Float32Array(2 * count), 1));
        positionArray = posAttribute.array;
        velocityArray = geometry.getAttribute('velocity').array;

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 1, 500);
        camera.position.z = 200;
        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('shuicheCanvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight, false);
        renderer.setClearColor(0x000000, 0);
        
        for (let index = 0; index < count; index++) {
            const x = Math.random() * 800 - 400, y = Math.random() * 800 - 400, z = Math.random() * 400 - 200;
            positionArray[6 * index] = x; positionArray[6 * index + 1] = y; positionArray[6 * index + 2] = z;
            positionArray[6 * index + 3] = x; positionArray[6 * index + 4] = y; positionArray[6 * index + 5] = z;
        }
        scene.add(new THREE.LineSegments(geometry, new THREE.LineBasicMaterial({ color: 0xffffff })));
        
        window.addEventListener('resize', debounceResize, { passive: true });
        document.body.addEventListener('pointermove', e => { mouseX = e.clientX - windowHalfX; mouseY = e.clientY - windowHalfY; }, { passive: true });
        
        if (window.isParticlesEnabled) { clock.start(); anime(); }
    }

    let resizeTimeout;
    function debounceResize() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            windowHalfX = window.innerWidth / 2; windowHalfY = window.innerHeight / 2;
        }, 100);
    }

    function anime() {
        let delta = clock.getDelta();
        delta = Math.min(delta, 0.1); 
        const timeScale = delta / (1 / 60); 

        for (let index = 0; index < count; index++) {
            velocityArray[2 * index] += 0.015 * timeScale;
            velocityArray[2 * index + 1] += 0.015 * timeScale;
            positionArray[6 * index + 2] += (velocityArray[2 * index] + 0.03) * timeScale;
            positionArray[6 * index + 5] += velocityArray[2 * index + 1] * timeScale;
            
            if (positionArray[6 * index + 2] > 200) {
                let z = Math.random() * 200 - 200;
                positionArray[6 * index + 2] = z; positionArray[6 * index + 5] = z;
                velocityArray[2 * index] = 0; velocityArray[2 * index + 1] = 0;
            }
        }
        posAttribute.needsUpdate = true;
        camera.position.x += (-mouseX * 0.1 - camera.position.x) * 0.02;
        camera.position.y += (-mouseY * 0.1 - camera.position.y) * 0.02;
        camera.lookAt(scene.position);
        renderer.render(scene, camera);
        animationId = requestAnimationFrame(anime);
    }

    document.addEventListener("visibilitychange", () => {
        if (document.hidden && animationId !== null) { cancelAnimationFrame(animationId); animationId = null; } 
        else if (!document.hidden && animationId === null && window.isParticlesEnabled) { clock.start(); anime(); }
    });

    window.bgEngine = {
        start: () => { if (animationId === null) { if(clock) clock.start(); anime(); } },
        stop: () => { if (animationId !== null) { cancelAnimationFrame(animationId); animationId = null; } }
    };
    window.bgRenderer = { setClearColor: (c, a) => renderer ? renderer.setClearColor(c, a) : null };
    window.addEventListener('DOMContentLoaded', init);
})();

function updateGlowingShadow() { glowingCard.style.boxShadow = '0px 10px 15px rgba(0, 0, 0, 0), 0 0 56px #fff inset'; }

function switchPageTo(page) {

}

document.addEventListener('play', e => {

}, true);

function loadMusicPlayer() {
    let indexSong = 0, pendingCurrentTime = 0, isLocked = false, songsLength = null, selectedSong = null, songIsPlayed = false, progress_elmnt = null, songName_elmnt = null, sliderImgs_elmnt = null, singerName_elmnt = null, musicPlayerInfo_elmnt = null, progressBarIsUpdating = false, broadcastGuarantor_elmnt = null, isSwitchingMusic = false, preloadAbortController = null;

        if (key === '2') { switchBackground(BG_TOP_RIGHT, false); currentBgIndex = 1; }
        if (key === '3') { switchBackground(BG_BOTTOM_LEFT, true); currentBgIndex = 2; }
        if (key === '4') { switchBackground(BG_BOTTOM_RIGHT, true); currentBgIndex = 3; }
        if (key === 'p') { window.isParticlesEnabled = !window.isParticlesEnabled; window.userToggledParticles = true; updateParticlesDisplay(); }

      scratchWallN: [[0, 0], [0, -1]], scratchWallS: [[-7, -1], [-6, -2]], scratchWallE: [[-2, -2], [-2, -3]],
      scratchWallW: [[-4, 0], [-4, -1]], tired: [[-3, -2]], sleeping: [[-2, 0], [-2, -1]],
      N: [[-1, -2], [-1, -3]], NE: [[0, -2], [0, -3]], E: [[-3, 0], [-3, -1]], SE: [[-5, -1], [-5, -2]],
      S: [[-6, -3], [-7, -2]], SW: [[-5, -3], [-6, -1]], W: [[-4, -2], [-4, -3]], NW: [[-1, 0], [-1, -1]],
    };

  function sleep() {
    forceSleep = !forceSleep; nudge = false; localStorage.setItem("oneko:forceSleep", forceSleep);
    if (!forceSleep) { resetIdleAnimation(); return; }
    mousePosX = nekoPosX; mousePosY = nekoPosY;
  }

  function create() {
    variant = parseLocalStorage("variant", "classic"); kuroNeko = parseLocalStorage("kuroneko", false);
    if (!variants.some((v) => v[0] === variant)) { variant = "classic"; }
    
    // 恢复上次保存的皮肤，如果没有保存则使用一个默认的蓝猫皮肤防空
    const savedSkin = localStorage.getItem("oneko:skin") || "https://dogpan.com/f/v2MpsA/blue.png";

nekoEl.id = "oneko"; nekoEl.style.width = "32px"; nekoEl.style.height = "32px";
    nekoEl.style.position = "fixed"; nekoEl.style.backgroundImage = `url('${savedSkin}')`;
    nekoEl.style.imageRendering = "pixelated"; nekoEl.style.left = `${nekoPosX - 16}px`; nekoEl.style.top = `${nekoPosY - 16}px`;
    nekoEl.style.filter = kuroNeko ? "invert(100%)" : "none"; nekoEl.style.zIndex = "9999";
    nekoEl.style.touchAction = "none"; nekoEl.style.userSelect = "none"; nekoEl.style.webkitUserSelect = "none";
    
    // ▼ 添加下面这行代码（1.5倍大小，你可以改成 2 就是两倍大小）▼
    nekoEl.style.transform = "scale(1.5)";
    
    document.body.appendChild(nekoEl);

    // 更新鼠标目标的中心逻辑
    function updateMousePos(e) {
        // [新增] 判断如果面板正在展开，且鼠标移动到了面板的范围内，停止更新追随坐标 (不进入面板区域)
        if (skinMenu.style.display === "grid") {
            const rect = skinMenu.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right &&
                e.clientY >= rect.top && e.clientY <= rect.bottom) {
                return; // 鼠标位于面板内时，取消位置捕获，猫咪将停在边上不会跑进去
            }
        }
        
        let offsetLeft = window.visualViewport ? window.visualViewport.offsetLeft : 0;
        let offsetTop = window.visualViewport ? window.visualViewport.offsetTop : 0;
        mousePosX = e.clientX + offsetLeft;
        mousePosY = e.clientY + offsetTop;
    }

    window.addEventListener("mousemove", (e) => { if (forceSleep) return; updateMousePos(e); });
    window.addEventListener("pointermove", (e) => { if (forceSleep) return; if (e.pointerType === "touch") updateMousePos(e); });

    // 缩放/恢复页面大小时，把跑偏的猫拉回到可视区域中心
    function handleResize() {
        if (window.visualViewport) {
            let offsetLeft = window.visualViewport.offsetLeft;
            let offsetTop = window.visualViewport.offsetTop;
            let vW = window.visualViewport.width;
            let vH = window.visualViewport.height;
            // 如果目标超出了你目前能看到的区域，强制拉回屏幕中间
            if (mousePosX < offsetLeft || mousePosX > offsetLeft + vW || mousePosY < offsetTop || mousePosY > offsetTop + vH) {
                mousePosX = offsetLeft + vW / 2;
                mousePosY = offsetTop + vH / 2;
            }
        }
        if (forceSleep) { forceSleep = false; sleep(); }
    }
    
    window.addEventListener("resize", handleResize);
    if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", handleResize);
        window.visualViewport.addEventListener("scroll", handleResize); // 监听手机双指平移拖拽
    }

let clickTimeout = null; // 用于区分单击和双击

    nekoEl.addEventListener("pointerdown", (e) => {
      if (e.button !== 0 && e.pointerType === "mouse") return;
      
      e.preventDefault(); 
      grabbing = true;
      let isDragging = false; // 用来精确判断是否发生了拖拽
      
      if (nekoEl.setPointerCapture) { try { nekoEl.setPointerCapture(e.pointerId); } catch (_) {} }
      
      let startX = e.clientX, startY = e.clientY, startNekoX = nekoPosX, startNekoY = nekoPosY, grabInterval;

      const moveHandler = (e) => {
        e.preventDefault();
        const deltaX = e.clientX - startX; const deltaY = e.clientY - startY;
        const absDeltaX = Math.abs(deltaX); const absDeltaY = Math.abs(deltaY);

        // 如果移动距离超过 5 像素，判定为拖拽行为，不再触发点击
        if (absDeltaX > 5 || absDeltaY > 5) {
            isDragging = true; 
        }

        if (absDeltaX > absDeltaY && absDeltaX > 10) { setSprite(deltaX > 0 ? "scratchWallW" : "scratchWallE", frameCount); } 
        else if (absDeltaY > absDeltaX && absDeltaY > 10) { setSprite(deltaY > 0 ? "scratchWallN" : "scratchWallS", frameCount); }

        if (grabStop || absDeltaX > 10 || absDeltaY > 10 || Math.sqrt(deltaX ** 2 + deltaY ** 2) > 10) {
          grabStop = false; 
          clearTimeout(grabInterval);
          grabInterval = setTimeout(() => { grabStop = true; nudge = false; startX = e.clientX; startY = e.clientY; startNekoX = nekoPosX; startNekoY = nekoPosY; }, 150);
        }

        nekoPosX = startNekoX + deltaX; nekoPosY = startNekoY + deltaY;
        nekoEl.style.left = `${nekoPosX - 16}px`; nekoEl.style.top = `${nekoPosY - 16}px`;
      };

      const upHandler = (e) => {
        grabbing = false; nudge = true; resetIdleAnimation();
        window.removeEventListener("pointermove", moveHandler); 
        window.removeEventListener("pointerup", upHandler); 
        window.removeEventListener("pointercancel", upHandler);
        if (nekoEl.releasePointerCapture) { try { nekoEl.releasePointerCapture(e.pointerId); } catch (_) {} }

        // 【单击与双击的判断逻辑】
        if (!isDragging) {
            const currentTime = Date.now();
            if (currentTime - lastClickTime < 300) {
                // 如果 300ms 内连续点击了两次 -> 判定为双击，猫咪睡觉
                clearTimeout(clickTimeout);
                sleep();
                lastClickTime = 0;
            } else {
                // 单击 -> 延迟 300ms 等待确认不是双击后，弹出皮肤面板
                lastClickTime = currentTime;
                clickTimeout = setTimeout(() => {
                    if (forceSleep) sleep(); // 如果猫咪睡着了先唤醒
                    showSkinMenu(); // 弹出选择面板
                }, 300);
            }
        }
      };

      window.addEventListener("pointermove", moveHandler, { passive: false });
      window.addEventListener("pointerup", upHandler); 
      window.addEventListener("pointercancel", upHandler);
    });

    nekoEl.addEventListener("contextmenu", (e) => { e.preventDefault(); kuroNeko = !kuroNeko; localStorage.setItem("oneko:kuroneko", kuroNeko); nekoEl.style.filter = kuroNeko ? "invert(100%)" : "none"; });
    window.onekoInterval = setInterval(frame, 100);
  }

  function getSprite(name, frame) { return spriteSets[name][frame % spriteSets[name].length]; }
  function setSprite(name, frame) { const sprite = getSprite(name, frame); nekoEl.style.backgroundPosition = `${sprite[0] * 32}px ${sprite[1] * 32}px`; }
  function resetIdleAnimation() { idleAnimation = null; idleAnimationFrame = 0; }

  function idle() {
    idleTime += 1; let avalibleIdleAnimations = [];
    if (idleTime > 10 && Math.floor(Math.random() * 30) == 0 && idleAnimation == null) {
      avalibleIdleAnimations = ["sleeping", "scratchSelf", "sleeping", "scratchSelf", "scratchSelf"];
      // 判断墙壁时，利用当前的坐标来智能判断
      if (nekoPosX < 32) avalibleIdleAnimations.push("scratchWallW");
      if (nekoPosY < 32) avalibleIdleAnimations.push("scratchWallN");
      if (nekoPosX > window.innerWidth - 32) avalibleIdleAnimations.push("scratchWallE");
      if (nekoPosY > window.innerHeight - 32) avalibleIdleAnimations.push("scratchWallS");
      idleAnimation = avalibleIdleAnimations[Math.floor(Math.random() * avalibleIdleAnimations.length)];
    }

    if (forceSleep) idleAnimation = "sleeping";

    switch (idleAnimation) {
      case "sleeping":
        if (idleAnimationFrame < 8 && nudge && forceSleep) { setSprite("idle", 0); break; } 
        else if (nudge) { nudge = false; resetIdleAnimation(); }
        if (idleAnimationFrame < 8) { setSprite("tired", 0); break; }
        setSprite("sleeping", Math.floor(idleAnimationFrame / 4));
        if (idleAnimationFrame > 192 && !forceSleep) resetIdleAnimation();
        break;
      case "scratchWallN": case "scratchWallS": case "scratchWallE": case "scratchWallW": case "scratchSelf":
        setSprite(idleAnimation, idleAnimationFrame); if (idleAnimationFrame > 9) resetIdleAnimation(); break;
      default: setSprite("idle", 0); return;
    }
    idleAnimationFrame += 1;
  }

  function frame() {
    frameCount += 1;

    if (grabbing) { grabStop && setSprite("alert", 0); return; }

    const diffX = nekoPosX - mousePosX; const diffY = nekoPosY - mousePosY; const distance = Math.sqrt(diffX ** 2 + diffY ** 2);

    if (forceSleep && Math.abs(diffY) < nekoSpeed && Math.abs(diffX) < nekoSpeed) {
      nekoPosX = mousePosX; nekoPosY = mousePosY; nekoEl.style.left = `${nekoPosX - 16}px`; nekoEl.style.top = `${nekoPosY - 16}px`; idle(); return;
    }

    if ((distance < nekoSpeed || distance < 48) && !forceSleep) { idle(); return; }

    idleAnimation = null; idleAnimationFrame = 0;
    if (idleTime > 1) { setSprite("alert", 0); idleTime = Math.min(idleTime, 7); idleTime -= 1; return; }

    let direction = diffY / distance > 0.5 ? "N" : "";
    direction += diffY / distance < -0.5 ? "S" : "";
    direction += diffX / distance > 0.5 ? "W" : "";
    direction += diffX / distance < -0.5 ? "E" : "";
    if (!direction) direction = "idle";
    setSprite(direction, frameCount);

    nekoPosX -= (diffX / distance) * nekoSpeed; nekoPosY -= (diffY / distance) * nekoSpeed;

    // 把墙壁边缘判定，锁定为你当前“眼睛能看到的区域 (Visual Viewport)”
    let offsetLeft = window.visualViewport ? window.visualViewport.offsetLeft : 0;
    let offsetTop = window.visualViewport ? window.visualViewport.offsetTop : 0;
    let vWidth = window.visualViewport ? window.visualViewport.width : window.innerWidth;
    let vHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;

    let minX = offsetLeft + 24;
    let maxX = offsetLeft + vWidth - 24;
    let minY = offsetTop + 24;
    let maxY = offsetTop + vHeight - 24;

    nekoPosX = Math.min(Math.max(minX, nekoPosX), maxX);
    nekoPosY = Math.min(Math.max(minY, nekoPosY), maxY);

    nekoEl.style.left = `${nekoPosX - 16}px`;
    nekoEl.style.top = `${nekoPosY - 16}px`;
  }

  create();
})();

    </script>
</body>
