<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>带参数调优的完美系统音效</title>
    <style>
        body { display: flex; gap: 20px; justify-content: center; align-items: center; height: 100vh; background-color: #f5f5f7; font-family: sans-serif; margin: 0; }
        .sys-button { padding: 12px 30px; font-size: 16px; color: #333; background: #ffffff; border: 1px solid #d1d1d6; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; user-select: none; transition: all 0.1s; }
        .sys-button:active { background: #e5e5ea; transform: scale(0.98); }
    </style>
</head>
<body>

    <button id="btn1" class="sys-button">点击听听看</button>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext({ latencyHint: 'interactive' });
        let clickAudioBuffer = null; 

        // 🎛️ === 你可以微调的音效参数 === 🎛️
        const CONFIG = {
            VOLUME: 1,  // 音量大小 (0.0 到 1.0)。原站听起来柔和，通常在 0.3 到 0.5 之间
            SPEED: 1.05    // 播放速度/音调。1.0 是原声，>1 声音更短促清脆，<1 声音更低沉厚重
        };

        // 创建全局的音量控制节点 (类似调音台的主推子)
        const masterGain = audioCtx.createGain();
        masterGain.gain.value = CONFIG.VOLUME;
        // 将音量节点连接到电脑扬声器
        masterGain.connect(audioCtx.destination);

        async function loadSound() {
            try {
                const url = "https://raw.githubusercontent.com/ryokun6/ryos/main/public/sounds/MenuItemClick.mp3";
                const response = await fetch(url);
                const arrayBuffer = await response.arrayBuffer();
                clickAudioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            } catch (error) {
                console.error("加载失败:", error);
            }
        }

        async function playClickSound(e) {
            e.preventDefault(); 
            if (!clickAudioBuffer) return; 
// 只要音频引擎不是 running (运行中) 状态，就强制唤醒
if (audioCtx.state !== 'running') {
    await audioCtx.resume();
}
            // 创建播放器
            const source = audioCtx.createBufferSource();
            source.buffer = clickAudioBuffer;
            
            // 调整播放速度和音高
            source.playbackRate.value = CONFIG.SPEED;

            // 【关键改变】不再直接连接到扬声器，而是连接到刚刚建好的"音量控制节点"
            source.connect(masterGain);
            
            // 立即播放
            source.start(audioCtx.currentTime); 
        }

        loadSound();
        document.getElementById('btn1').addEventListener('pointerdown', playClickSound);
        
        
// 监听网页可见性变化 (切后台 / 切回前台)
document.addEventListener("visibilitychange", () => {
    // 如果用户切回了这个标签页，且音频引擎不在运行中
    if (document.visibilityState === "visible" && audioCtx.state !== 'running') {
        // 尝试静默唤醒音频引擎 (部分浏览器允许这种恢复操作)
        audioCtx.resume().catch(() => {
            // 如果浏览器严格限制必须点击才能唤醒，就忽略报错，等用户点击时再唤醒
        });
    }
});
        
    </script>

</body>
</html>
