    <style>
        /* CSS 变量与核心主题系统 */
        :root {
            --glow-sens: 30;
            --dark: hsl(260, 25%, 10%);
            --fg: black;
            --h: 260;
            --card-bg: linear-gradient(8deg, var(--dark) 75%, color-mix(in hsl, var(--dark), white 2.5%) 75.5%);
            --blend: soft-light;
            --glow-blend: plus-lighter;
            --glow-color: 40deg 80% 80%;
            --duration: 1s;
            --ease-slider: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-timeline: cubic-bezier(0.71, 0.21, 0.3, 0.95);
            --page-height: 498px;
            --accent: hsl(260, 100%, 80%);
            --glowing-card-bg: rgb(255 255 255 / 15%);
            --glowing-card-border: rgb(255 255 255 / 70%);
            --glowing-card-backdrop: blur(7px);
            --link-card-bg: rgb(255 255 255 / 9%);
            --link-card-hover-bg: rgb(255 255 255 / 25%);
            --link-card-border: rgb(255 255 255 / 40%);
            --link-card-box-shadow: 0px 4px 3px #0001, 0 0 35px #fffa inset;
            --spotify-card-bg: rgb(255 255 255 / 15%);
            --spotify-card-border: rgb(255 255 255 / 45%);
            --spotify-card-box-shadow: 0px 4px 3px #0001, 0 0 38px #fffa inset;
            --music-player-bg: rgb(255 255 255 / 15%);
            --music-player-shadow: none;
        }

        .light {
            --card-bg: linear-gradient(8deg, color-mix(in hsl, hsl(260, 25%, 95%), var(--dark) 2.5%) 75%, hsl(260, 25%, 95%) 75.5%);
            --blend: darken;
            --glow-blend: luminosity;
            --glow-color: 280deg 90% 95%;
            --glowing-card-bg: rgb(255 255 255 / 13%);
            --glowing-card-border: rgb(255 255 255 / 80%);
            --glowing-card-backdrop: blur(7px);
            --link-card-bg: rgb(255 255 255 / 7%);
            --link-card-hover-bg: rgb(255 255 255 / 25%);
            --link-card-border: rgb(255 255 255 / 45%);
            --link-card-box-shadow: 0px 4px 3px #0001, 0 0 25px #fffa inset;
            --spotify-card-bg: rgb(255 255 255 / 7%);
            --spotify-card-border: rgb(255 255 255 / 60%);
            --spotify-card-box-shadow: 0px 4px 3px #0001, 0 0 38px #fffa inset;
            --music-player-bg: rgb(255 255 255 / 10%);
            --music-player-shadow: 0 2px 6px 1px #0000001f;

        /* 全局基础样式 */
        body {
            background-color: #000000 !important;
            background-image: none !important;
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: var(--fg);
            overflow: hidden;
            touch-action: manipulation;
            transition: color 0.8s ease;
        }

        body::before, body::after {
            content: "";
            position: fixed;
            left: 0; right: 0;
            background-color: #000000;
            z-index: 99999;
            pointer-events: none;
        }
        body::before {
            top: 0;
            height: env(safe-area-inset-top);
        }
        body::after {
            bottom: 0;
            height: env(safe-area-inset-bottom);
        }

#bg-container {
    position: fixed;
    inset: 0;
    z-index: -3;
    pointer-events: none;
    contain: strict; /* 告诉浏览器：这个容器被死死固定了，不会影响外面 */
}

.bg-layer {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
    transform: translateZ(0);
    will-change: opacity;
    contain: strict; /* 内部渲染完全独立 */
}

        canvas {
            position: fixed;
            inset: 0;
            width: 100%;

        /* [优化点1] 补充 Safari 专属的 webkit 内核前缀 */

            overflow: hidden;

        /*[优化点1] 补充 Webkit 防选中 */
        .music-player {
            --color-gray: #e5e7ea; --color-blue: #78adfe; --color-blue-dark: #5781bd;
            --box-shadow: 0 2px 6px 1px #0000001f; --cover-size: 4.2em; --border-radius: 1.2em;
            --music-player-height: calc(var(--page-height) - 0px); --offset-cover: 1em;
            width: 100%; max-width: 335px; height: 445px;
            -webkit-user-select: none; user-select: none;
            border-radius: var(--border-radius); background-color: var(--music-player-bg);
            margin: -15px auto 0; box-sizing: border-box; color: inherit; transition: background-color 0.8s ease;
        }

        .slider {
            --shadow-opacity: 1; z-index: 0; flex-shrink: 0; height: 6.8em; position: relative;
            border-radius: inherit; transition: var(--duration) height var(--ease-timeline);
        }
        .slider.resize { --shadow-opacity: 0; height: var(--music-player-height); }
        .slider::after {
            content: ""; position: absolute; inset: 0; width: 100%; height: 100%; z-index: -1;
            pointer-events: none; border-radius: inherit; box-shadow: var(--box-shadow);
            opacity: var(--shadow-opacity); transition: opacity var(--duration) ease, box-shadow 0.8s ease;
        }
        .slider__content {
            position: absolute; top: 0; left: 0; overflow: hidden; border-radius: inherit;
            width: var(--cover-size); height: var(--cover-size);
            transition: transform var(--duration) var(--ease-timeline), width var(--duration) var(--ease-timeline), height var(--duration) var(--ease-timeline);
            transform: translate3d(var(--offset-cover), var(--offset-cover), 0);
        }
        .slider.resize .slider__content { width: 100%; height: 22em; transform: translate3d(0, 0, 0); }
        .slider__content .button { --size: 2.5em; z-index: 1; position: absolute; width: var(--size); height: var(--size); }
        .slider__content i { position: absolute; pointer-events: none; font-size: var(--size); }

        .music-player__playlist-button { top: 5.5%; left: 5.5%; transform: scale(0); transition: calc(var(--duration) / 2) transform; }
        .slider.resize .music-player__playlist-button { transform: scale(1); transition: 0.30s var(--duration) transform cubic-bezier(0, 0.85, 0.11, 1.64); }
        .music-player__broadcast-guarantor { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .music-player__broadcast-guarantor .icon-pause, .music-player__broadcast-guarantor.click .icon-play { opacity: 0; }
        .music-player__broadcast-guarantor.click .icon-pause { opacity: 1; }
        .slider__imgs { width: 100%; height: 100%; filter: brightness(75%); transform: translate3d(calc(var(--index) * 100%), 0, 0); transition: var(--duration) transform var(--ease-slider); }
        .slider__imgs>img { pointer-events: none; }

        .slider__controls {

<script>
// ==========================================
// 🎨 全局背景与主题配置区 (以后修改全在这里)
// 支持格式: 1. 图片地址  2. #000 纯色  3. linear-gradient 渐变
// ==========================================

// 1. 左上角 (日间默认) - 对应键盘 1
const BG_TOP_LEFT = 'https://raw.githubusercontent.com/me2077/me2077.github.io/main/images/AAA.png';

// 2. 右上角 (夜间默认) - 对应键盘 2
const BG_TOP_RIGHT = '#000000';

// 3. 左下角 (自定义1) - 对应键盘 3
const BG_BOTTOM_LEFT = 'https://media.giphy.com/media/3ohs4ucXR6NYRxmpTa/giphy.gif?cid=ecf05e47d0c25c1f3376cd42c27baa27a8f9200d0bd75464&ep=v1_user_favorites&rid=giphy.gif&ct=g';

// 4. 右下角 (自定义2) - 对应键盘 4
const BG_BOTTOM_RIGHT = 'linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)), linear-gradient(15.3deg, rgba(111, 71, 133, 1) 5.6%, rgba(232, 129, 166, 1) 19.6%, rgba(237, 237, 183, 1) 42.1%, rgba(244, 166, 215, 1) 63.7%, rgba(154, 219, 232, 1) 78.7%, rgba(238, 226, 159, 1) 96.8%)';


// --- 全局状态与配置 ---
window.isParticlesEnabled = !document.body.classList.contains('light');
window.userToggledParticles = false; 
let bgChangeSequence = 0;
let currentPage = 2;
const glowingCard = document.querySelector('.glowing-card');
const audio = document.getElementById('audioPlayer');
let isPlaying = false;

// [优化点4] 全局声明需要缓存的 DOM 节点，避免滑动时高频查询
let pagesContainer;
let bullets;

// --- 主题循环配置 ---
const bgPresets =[
    { name: 'top-left',    value: BG_TOP_LEFT,     isLight: true },
    { name: 'top-right',   value: BG_TOP_RIGHT,    isLight: false }, // 黑夜模式
    { name: 'bottom-left', value: BG_BOTTOM_LEFT,  isLight: true },
    { name: 'bottom-right',value: BG_BOTTOM_RIGHT, isLight: true }
];
let currentBgIndex = 0;

// --- DOMContentLoaded 集中接管所有的纯净事件与节点缓存 (为分离成独立 JS 铺路) ---
document.addEventListener('DOMContentLoaded', () => {
    // 1. 初始化 DOM 节点缓存
    pagesContainer = document.querySelector('.pages');
    bullets = document.querySelectorAll('.bullet');

// 2. 绑定主题与壁纸切换事件 (传入 value 和 isLight)
    document.getElementById('btn-theme-light').addEventListener('click', () => switchBackground(BG_TOP_LEFT, true));
    document.getElementById('btn-theme-dark').addEventListener('click', () => switchBackground(BG_TOP_RIGHT, false));
    document.getElementById('btn-bg-1').addEventListener('click', () => switchBackground(BG_BOTTOM_LEFT, true));
    document.getElementById('btn-bg-2').addEventListener('click', () => switchBackground(BG_BOTTOM_RIGHT, true));

    // 3. 绑定悬停动效
    document.querySelectorAll('.theme-toggle, .day-toggle').forEach(button => {
        button.addEventListener('mouseenter', function() { this.style.transform = 'scale(1.2)'; });
        button.addEventListener('mouseleave', function() { this.style.transform = 'scale(1)'; });
        button.addEventListener('click', function() { setTimeout(() => { this.style.transform = 'scale(1)'; }, 350); });
    });

    // 4. 绑定赞赏打赏事件
    document.getElementById('rewardContainer').addEventListener('click', () => {
        document.getElementById('rewardContainer').classList.toggle('show-qr');
    });
    document.getElementById('reward-wx').addEventListener('click', e => e.stopPropagation());
    document.getElementById('reward-zfb').addEventListener('click', e => e.stopPropagation());

    // 5. 绑定彩蛋特效
    document.getElementById('profile-pic').addEventListener('click', triggerConfetti);

    // 6. 绑定 Spotify 与 vCard 卡片事件
    document.getElementById('spotify-card-wrap').addEventListener('click', () => {
        window.open('https://open.spotify.com/track/3UkRfA9F62DYYDzqOskoov', '_blank');
    });
    document.getElementById('btn-spotify-play').addEventListener('click', (e) => {
        e.stopPropagation();
        togglePlay(e.currentTarget);
    });
    document.getElementById('btn-vcard').addEventListener('click', () => {
        if(typeof downloadVCard === 'function') downloadVCard();
    });

    // 7. 绑定分页小圆点事件
    if (bullets) {
        bullets.forEach(b => {
            b.addEventListener('click', function() {
                switchPageTo(parseInt(this.dataset.page));
            });
        });
    }

    // 8. ClipboardJS 初始化（因外链 defer 的关系，这能确保它安全执行）
    if (typeof ClipboardJS !== 'undefined') {
        var clipboard = new ClipboardJS('#wechatBtn', { text: () => "lllIIllIIlIII" });
        clipboard.on('success', () => { alert('👉微信号复制成功,即将前往微信！'); window.location.href = 'wechat://'; });
    }
});


// --- 核心：粒子状态控制引擎 ---
function updateParticlesDisplay() {
    const canvas = document.getElementById('shuicheCanvas');
    if (!canvas) return;

    if (window.isParticlesEnabled) {
        canvas.style.display = 'block';
        if (window.bgEngine && window.bgEngine.start) window.bgEngine.start();
    } else {
        canvas.style.display = 'none';
        if (window.bgEngine && window.bgEngine.stop) window.bgEngine.stop();
    }
}

// --- 单层平滑过渡覆盖逻辑 ---
// 全局图层层级计数器
let bgLayerIndex = 0; 

function crossfadeBackground(backgroundValue, isLightTheme) {
    const currentChangeId = ++bgChangeSequence;
    const container = document.getElementById('bg-container');
    if (!container) return;

    const urlMatch = backgroundValue.match(/url\(['"]?(.*?)['"]?\)/);
    const imageUrl = urlMatch ? urlMatch[1] : null;

    const applyEffect = () => {
        if (currentChangeId !== bgChangeSequence) return;
        
        bgLayerIndex++; // 每切换一次，新图层永远盖在最上面

        // 1. 【核心优化】直接创建一个全新的 DOM 节点
        const newLayer = document.createElement('div');
        newLayer.className = 'bg-layer';
        newLayer.style.zIndex = bgLayerIndex;
        newLayer.style.background = backgroundValue.startsWith('url') ? `${backgroundValue} center/cover` : backgroundValue;
        
        // 将新图层塞入容器底部
        container.appendChild(newLayer);

        // 2. 强制 Safari 立即在后台 GPU 渲染这个渐变，不占用动画的时间
        void newLayer.offsetWidth;

        // 3. 切换页面主体的日夜模式
        document.body.classList.toggle('light', isLightTheme);
        document.documentElement.style.setProperty('--fg', isLightTheme ? 'black' : '#f0f0f0');

        if (!window.userToggledParticles) window.isParticlesEnabled = !isLightTheme;
        
        // 如果切到日间，立刻关闭星空引擎释放性能
        if (!window.isParticlesEnabled) {
            updateParticlesDisplay();
        }

        // 4. 等下一帧渐变渲染完毕后，纯 GPU 驱动淡入，绝对丝滑
        requestAnimationFrame(() => {
            newLayer.style.opacity = '1';
        });

        // 5. 动画结束后的收尾工作：打扫战场
        setTimeout(() => {
            // 如果中途手速太快又点了切换，中断清理
            if (currentChangeId !== bgChangeSequence) return; 
            
            // 找出容器里所有的背景图层
            const layers = container.querySelectorAll('.bg-layer');
            layers.forEach(layer => {
                // 只保留目前最新的这一层，把之前垫底的旧背景彻底删除释放内存
                if (layer !== newLayer) {
                    layer.remove();
                }
            });
            
            // 如果切到夜间，等背景渐变动画安全走完了，再启动星空引擎，错峰运行
            if (window.isParticlesEnabled) {
                updateParticlesDisplay();
            }
        }, 850);
    };

    // 如果是图片，等图片预加载完毕再执行；如果是渐变，直接执行
    if (imageUrl) {
        const img = new Image();
        img.src = imageUrl;
        img.onload = applyEffect;
        img.onerror = applyEffect;
    } else {
        applyEffect();
    }
}

// --- 删除原来的 toggleTheme 和 switchBackground，替换为下面这个 ---

function switchBackground(value, isLight = true) {
    // 智能判断：如果是渐变或者纯色(#/rgb/hsl)，直接渲染
    if (value.includes('gradient') || /^(#|rgb|hsl)/.test(value.trim())) {
        crossfadeBackground(value, isLight);
    } else {
        // 否则当作图片链接，自动拼接 url('')
        crossfadeBackground(`url('${value}')`, isLight);
    }
}

(function initDoubleClickToggle() {
    let lastToggleTime = 0;
    function toggleParticles(e) {
        let now = new Date().getTime();
        if (now - lastToggleTime < 500) return;
        lastToggleTime = now;
        if (e.target && e.target.closest && e.target.closest('a, button, svg, img, video, .bullet, .link-card, .spotify-card, .play-btn, .theme-toggle, .day-toggle')) {
            return;
        }
        window.isParticlesEnabled = !window.isParticlesEnabled;
        window.userToggledParticles = true;
        updateParticlesDisplay();
    }
    document.addEventListener('dblclick', toggleParticles);
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(e) {
        let now = new Date().getTime();
        if (now - lastTouchEnd <= 400) {
            toggleParticles(e);
            lastTouchEnd = 0;
        } else {
            lastTouchEnd = now;
        }
    });
})();

// --- ThreeJS 星空粒子引擎 (适配外部 defer 加载防崩溃机制) ---
(function initBackgroundEngine() {
    const count = 1000; 
    let scene, camera, renderer, animationId = null, mouseX = 0, mouseY = 0;
    let windowHalfX = window.innerWidth / 2, windowHalfY = window.innerHeight / 2;
    
    let clock, geometry, posAttribute, positionArray, velocityArray;

    function init() {
        // [防错拦截] 如果 Three.js 由于网络延迟 (defer) 还没有加载完毕，则等待后重试，100% 杜绝报错崩溃。
        if (typeof THREE === 'undefined') {
            setTimeout(init, 50);
            return;
        }

        clock = new THREE.Clock(); 
        geometry = new THREE.BufferGeometry();
        posAttribute = new THREE.BufferAttribute(new Float32Array(6 * count), 3);
        posAttribute.setUsage(THREE.DynamicDrawUsage);
        geometry.setAttribute('position', posAttribute);
        geometry.setAttribute('velocity', new THREE.BufferAttribute(new Float32Array(2 * count), 1));
        positionArray = posAttribute.array;
        velocityArray = geometry.getAttribute('velocity').array;

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 1, 500);
        camera.position.z = 200;
        renderer = new THREE.WebGLRenderer({
            canvas: document.getElementById('shuicheCanvas'),
            antialias: true,
            alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight, false);
        renderer.setClearColor(0x000000, 0);
        
        for (let index = 0; index < count; index++) {
            const x = Math.random() * 800 - 400, y = Math.random() * 800 - 400, z = Math.random() * 400 - 200;
            positionArray[6 * index] = x; positionArray[6 * index + 1] = y; positionArray[6 * index + 2] = z;
            positionArray[6 * index + 3] = x; positionArray[6 * index + 4] = y; positionArray[6 * index + 5] = z;
        }
        scene.add(new THREE.LineSegments(geometry, new THREE.LineBasicMaterial({ color: 0xffffff })));
        
        window.addEventListener('resize', debounceResize, { passive: true });
        document.body.addEventListener('pointermove', e => {
            mouseX = e.clientX - windowHalfX; mouseY = e.clientY - windowHalfY;
        }, { passive: true });
        
        if (window.isParticlesEnabled) {
            clock.start(); 
            anime();
        }
    }

    let resizeTimeout;
    function debounceResize() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            windowHalfX = window.innerWidth / 2; windowHalfY = window.innerHeight / 2;
        }, 100);
    }

    function anime() {
        let delta = clock.getDelta();
        delta = Math.min(delta, 0.1); 
        const timeScale = delta / (1 / 60); 

        for (let index = 0; index < count; index++) {
            velocityArray[2 * index] += 0.015 * timeScale;
            velocityArray[2 * index + 1] += 0.015 * timeScale;
            positionArray[6 * index + 2] += (velocityArray[2 * index] + 0.03) * timeScale;
            positionArray[6 * index + 5] += velocityArray[2 * index + 1] * timeScale;
            
            if (positionArray[6 * index + 2] > 200) {
                let z = Math.random() * 200 - 200;
                positionArray[6 * index + 2] = z; positionArray[6 * index + 5] = z;
                velocityArray[2 * index] = 0; velocityArray[2 * index + 1] = 0;
            }
        }
        posAttribute.needsUpdate = true;
        
        camera.position.x += (-mouseX * 0.1 - camera.position.x) * 0.02;
        camera.position.y += (-mouseY * 0.1 - camera.position.y) * 0.02;
        camera.lookAt(scene.position);
        renderer.render(scene, camera);
        animationId = requestAnimationFrame(anime);
    }

    document.addEventListener("visibilitychange", () => {
        if (document.hidden && animationId !== null) {
            cancelAnimationFrame(animationId); animationId = null;
        } else if (!document.hidden && animationId === null && window.isParticlesEnabled) {
            clock.start(); 
            anime();
        }
    });

    window.bgEngine = {
        start: () => { 
            if (animationId === null) {
                if(clock) clock.start();
                anime(); 
            }
        },
        stop: () => { 
            if (animationId !== null) { 
                cancelAnimationFrame(animationId); 
                animationId = null; 
            } 
        }
    };
    window.bgRenderer = { setClearColor: (c, a) => renderer ? renderer.setClearColor(c, a) : null };
    window.addEventListener('DOMContentLoaded', init);
})();

    } else {

// --- 第3页音乐播放器内核 ---
function loadMusicPlayer() {
    let indexSong = 0;
    let pendingCurrentTime = 0;
    let isLocked = false;
    let songsLength = null;
    let selectedSong = null;
    let songIsPlayed = false;
    let progress_elmnt = null;
    let songName_elmnt = null;
    let sliderImgs_elmnt = null;
    let singerName_elmnt = null;
    let musicPlayerInfo_elmnt = null;
    let progressBarIsUpdating = false;
    let broadcastGuarantor_elmnt = null;
    let isSwitchingMusic = false;
    let preloadAbortController = null;

    const root = document.querySelector("#root");
    const mainAudio = document.getElementById('mainAudio');

    window.musicControls = {
        playPause: handlePlayMusic,
        next: () => handleChangeMusic({ isPrev: false }),
        prev: () => handleChangeMusic({ isPrev: true })
    };

    function savePlaybackState() {
        if (!selectedSong) return;
        const playbackState = {
            currentSongIndex: indexSong,
            isPlaying: !selectedSong.paused,
            volume: selectedSong.volume,
            currentTime: pendingCurrentTime > 0 ? pendingCurrentTime : selectedSong.currentTime
        };
        localStorage.setItem('musicPlayerState', JSON.stringify(playbackState));
    }

    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') savePlaybackState(); });
    window.addEventListener('beforeunload', savePlaybackState);
    setInterval(savePlaybackState, 5000);

    function updateUIForSong(index) {
        updateInfo(songName_elmnt, songs[index].songName);
        updateInfo(singerName_elmnt, songs[index].artist);
        setProperty(sliderImgs_elmnt, "--index", -index);
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: songs[index].songName,
                artist: songs[index].artist,
                artwork:[{ src: songs[index].files.cover, sizes: '512x512', type: 'image/jpeg' }]
            });
        }
    }

    function restorePlaybackState() {
        try {
            const savedState = localStorage.getItem('musicPlayerState');
            if (!savedState) { updateUIForSong(0); return; }
            const playbackState = JSON.parse(savedState);
            if (playbackState.currentSongIndex !== undefined && playbackState.currentSongIndex >= 0 && playbackState.currentSongIndex <= songsLength) {
                indexSong = playbackState.currentSongIndex;
                if (playbackState.currentTime !== undefined) pendingCurrentTime = playbackState.currentTime;
                if (playbackState.volume !== undefined) mainAudio.volume = playbackState.volume;
                updateUIForSong(indexSong);
            } else { updateUIForSong(0); }
        } catch (e) { updateUIForSong(0); }
    }

    function preloadNextSongHead(nextIndex) {
        if (!songs[nextIndex] || !songs[nextIndex].files.song) return;
        const nextUrl = songs[nextIndex].files.song;
        if (preloadAbortController) preloadAbortController.abort();
        preloadAbortController = new AbortController();
        fetch(nextUrl, { headers: { 'Range': 'bytes=0-524288' }, signal: preloadAbortController.signal }).catch(err => {});
    }

    function handleChangeMusic({ isPrev = false, playListIndex = null }) {
        if (isLocked) return;
        let newIndex = playListIndex !== null ? playListIndex : (isPrev ? indexSong - 1 : indexSong + 1);
        if (newIndex < 0) newIndex = songsLength;
        if (newIndex > songsLength) newIndex = 0;
        if (newIndex === indexSong && playListIndex === null) return;

        let wasPlaying = songIsPlayed;
        isSwitchingMusic = true;
        indexSong = newIndex;
        pendingCurrentTime = 0;
        updateUIForSong(indexSong);
        mainAudio.src = songs[indexSong].files.song;

        if (wasPlaying) {
            let playPromise = mainAudio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => { isSwitchingMusic = false; }).catch(e => {
                    isSwitchingMusic = false; songIsPlayed = false;
                    broadcastGuarantor_elmnt.classList.remove("click");
                });
            }
            songIsPlayed = true;
            broadcastGuarantor_elmnt.classList.add("click");
            preloadNextSongHead((indexSong + 1) > songsLength ? 0 : indexSong + 1);
        } else {
            isSwitchingMusic = false;
            if (preloadAbortController) preloadAbortController.abort();
        }
        savePlaybackState();
    }

    function handlePlayMusic() {
        if (mainAudio.currentTime === mainAudio.duration && mainAudio.duration > 0) {
            handleChangeMusic({}); return;
        }
        if (!mainAudio.src || mainAudio.src === window.location.href || mainAudio.src === "") {
            mainAudio.src = songs[indexSong].files.song;
            mainAudio.play();
            songIsPlayed = true;
            broadcastGuarantor_elmnt.classList.add("click");
            preloadNextSongHead((indexSong + 1) > songsLength ? 0 : indexSong + 1);
        } else {
            if (mainAudio.paused) {
                mainAudio.play();
                preloadNextSongHead((indexSong + 1) > songsLength ? 0 : indexSong + 1);
            } else { mainAudio.pause(); }
        }
    }

    function updateTheProgressBar() {
        const duration = this.duration;
        const currentTime = this.currentTime;
        if (isNaN(duration) || duration === 0) return;
        const progressRatio = currentTime / duration;
        setProperty(progress_elmnt, "--scale", progressRatio);
        setProperty(progress_elmnt, "--width", `${progressRatio * 100}%`);

    function syncMediaSessionPosition() {
        if ('mediaSession' in navigator && !isNaN(mainAudio.duration) && isFinite(mainAudio.duration) && mainAudio.duration > 0) {
            try {
                let position = mainAudio.currentTime || 0;
                position = Math.max(0, Math.min(position, mainAudio.duration));

        { "bg": "#ebbe03", "artist": "Flower Face", "songName": "Jupiter", "files": { "song": "https://cdn.jsdelivr.net/gh/qxx2000/blog@main/music/Jupiter.mp3", "cover": "https://cdn.jsdelivr.net/gh/qxx2000/blog@main/music/Jupiter.webp" }, "duration": "4:31" },
        { "bg": "#ffc382", "artist": "La Femme", "songName": "Le jardin", "files": { "song": "https://cdn.jsdelivr.net/gh/qxx2000/blog@main/music/Le jardin.mp3", "cover": "https://cdn.jsdelivr.net/gh/qxx2000/blog@main/music/Le jardin.webp" }, "duration": "4:00" },

        { "bg": "#44c16fb5", "artist": "Marvel83'", "songName": "Alone With You", "files": { "song": "https://cdn.jsdelivr.net/gh/qxx2000/blog@main/music/Alone With You.mp3", "cover": "https://cdn.jsdelivr.net/gh/qxx2000/blog@main/music/Alone With You.webp" }, "duration": "4:53" },

    ];

    const musicPlayer = document.createElement("div");
    musicPlayer.className = "music-player flex-column";
    const slider = document.createElement("div");
    slider.className = "slider center";
    slider.onclick = handleResizeSlider;

    broadcastGuarantor.onclick = handlePlayMusic;
    broadcastGuarantor.innerHTML = '<i class="icon-play"></i><i class="icon-pause"></i>';
    const sliderImgs = document.createElement("div");

    songs.forEach(({ files: { cover }, songName }) => {
        const img = document.createElement("img"); img.src = cover; img.loading = "lazy"; img.className = "img"; img.alt = songName; sliderImgs.appendChild(img);
    });
    sliderContent.append(playlistButton, broadcastGuarantor, sliderImgs);

    }
    function controlSubtitleAnimation(parent, child) {
        if (child.classList.contains("animate")) return;
        const element = child.firstChild;
        if (child.clientWidth > parent.clientWidth) { child.appendChild(element.cloneNode(true)); child.classList.add("animate"); }
        setProperty(child.parentElement, "width", `${element.clientWidth}px`);
    }
    function setProperty(target, prop, value = "") { target.style.setProperty(prop, value); }
    function updateInfo(target, value) {
        while (target.firstChild) target.removeChild(target.firstChild);
        const targetChild = document.createElement("div"); targetChild.appendChild(document.createTextNode(value));
        target.appendChild(targetChild); target.classList.remove("animate"); controlSubtitleAnimation(musicPlayerInfo_elmnt, target);
    }
    function handleResize() { setProperty(document.documentElement, "--vH", `${window.innerHeight * 0.01}px`); }
    window.addEventListener("resize", handleResize);
    window.addEventListener("transitionstart", ({ target }) => { if (target === sliderImgs_elmnt) { isLocked = true; setProperty(sliderImgs_elmnt, "will-change", "transform"); } });
    window.addEventListener("transitionend", ({ target, propertyName }) => { if (target === sliderImgs_elmnt) isLocked = false; if (target.classList.contains("slider") && propertyName === "height") { controlSubtitleAnimation(musicPlayerInfo_elmnt, songName_elmnt); controlSubtitleAnimation(musicPlayerInfo_elmnt, singerName_elmnt); } });
    const stopScrub = () => { if (progressBarIsUpdating) { selectedSong.muted = false; progressBarIsUpdating = false; } };
    const moveScrub = (e) => { if (progressBarIsUpdating) { e.preventDefault(); handleScrub(e); selectedSong.muted = true; } };
    window.addEventListener("pointerup", stopScrub); window.addEventListener("pointermove", moveScrub);
    window.addEventListener("touchend", stopScrub); window.addEventListener("touchmove", moveScrub);
    handleResize();

function initKeyboardControls() {
    document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        
if (key === 't') {
            currentBgIndex = (currentBgIndex + 1) % bgPresets.length;
            const preset = bgPresets[currentBgIndex];
            // 自动读取数组中的值和日/夜模式状态
            switchBackground(preset.value, preset.isLight);
        }

        // 数字键直接对应顶部配置的四大金刚
        if (key === '1') { switchBackground(BG_TOP_LEFT, true); currentBgIndex = 0; }
        if (key === '2') { switchBackground(BG_TOP_RIGHT, false); currentBgIndex = 1; }
        if (key === '3') { switchBackground(BG_BOTTOM_LEFT, true); currentBgIndex = 2; }
        if (key === '4') { switchBackground(BG_BOTTOM_RIGHT, true); currentBgIndex = 3; }

        if (key === 'p') {
            window.isParticlesEnabled = !window.isParticlesEnabled;
            window.userToggledParticles = true;
            updateParticlesDisplay();
        }

        if (!e.shiftKey) {
            if (e.key === 'ArrowRight') {
                let next = currentPage + 1;
                if (next > 3) next = 1;
                switchPageTo(next);
            }
            if (e.key === 'ArrowLeft') {
                let prev = currentPage - 1;
                if (prev < 1) prev = 3;
                switchPageTo(prev);
            }
        }

        if (window.musicControls) {
            if (e.code === 'Space') {
                e.preventDefault();
                window.musicControls.playPause();
            }
            if (e.shiftKey) {
                if (e.key === 'ArrowRight') window.musicControls.next();
                if (e.key === 'ArrowLeft') window.musicControls.prev();
            }
        }
    });
}

let avatarSound = null;

async function initAvatarSound() {
    const audioUrl = "https://cdn.jsdelivr.net/gh/qxx2000/blog@main/img/Cat.wav";
    try {
        const response = await fetch(audioUrl, { cache: 'force-cache' });
        const audioBlob = await response.blob();
        const blobUrl = URL.createObjectURL(audioBlob);
        avatarSound = new Audio(blobUrl);
        avatarSound.volume = 0.35;
    } catch (error) {
        avatarSound = new Audio(audioUrl);
        avatarSound.volume = 0.35;
    }
}

if ('requestIdleCallback' in window) {
    requestIdleCallback(() => initAvatarSound());
} else {
    setTimeout(initAvatarSound, 1500); 
}

function triggerConfetti() {
    if (typeof confetti === 'function') confetti({ particleCount: 150, spread: 100 });
    if (avatarSound) {
        avatarSound.currentTime = 0; 
        avatarSound.play().catch(e => console.log(e));
    }
}

const video = document.getElementById('page1Video');
let videoLoaded = false;
if ('IntersectionObserver' in window && video) {
    const videoObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                if (!videoLoaded) { video.src = "https://cdn.jsdelivr.net/gh/qxx2000/blog@main/music/Movie.MP4"; videoLoaded = true; }
                video.muted = true; video.play().catch(() => {});
            } else { video.pause(); }
        });
    }, { threshold: 0.5 });
    videoObserver.observe(document.getElementById('page1-5'));
}
if(video) video.addEventListener('click', () => video.muted = false);

    loadMusicPlayer();
    initKeyboardControls();
    if (document.body.classList.contains('light')) {
        window.isParticlesEnabled = false;
        updateParticlesDisplay();
    }
    switchPageTo(2);
};
(function emojiCursor() {

    var possibleEmoji = [
        "😊","🥺","💙","🥰","⭐","🌈","❤","🧡","💛","💚","💜",
        "🏳️‍🌈","⚧","⌘","^^",":)","(^◡^)","≧◠‿◠≦"
    ];

    var particles = [];
    var cursor = { x: 0, y: 0 };
    var lastTime = 0;

    function init() {
        bindEvents();
        loop();
    }

    function bindEvents() {
        document.addEventListener('pointermove', onPointerMove, { passive: true });
        window.addEventListener('resize', onResize);
    }

    function onResize() {}

    function onPointerMove(e) {
        const now = Date.now();

        // 🔥 控制频率，避免手机卡顿
        if (now - lastTime < 18) return;
        lastTime = now;

        cursor.x = e.clientX;
        cursor.y = e.clientY;

        addParticle(
            cursor.x,
            cursor.y + window.scrollY,
            possibleEmoji[Math.floor(Math.random() * possibleEmoji.length)]
        );
    }

    function addParticle(x, y, character) {
        var particle = new Particle();
        particle.init(x, y, character);
        particles.push(particle);
    }

    function updateParticles() {
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            if (particles[i].lifeSpan < 0) {
                particles[i].die();
                particles.splice(i, 1);
            }
        }
    }

    function loop() {
        requestAnimationFrame(loop);
        updateParticles();
    }

    function Particle() {

        this.lifeSpan = 100;

        this.init = function(x, y, character) {

            this.velocity = {
                x: (Math.random() - 0.5) * 1.2,
                y: 1
            };

            this.position = {
                x: x,
                y: y
            };

            this.element = document.createElement('span');
            this.element.innerHTML = character;

            this.element.style.position = "fixed";
            this.element.style.left = "0";
            this.element.style.top = "0";
            this.element.style.pointerEvents = "none";
            this.element.style.zIndex = "999999";
            this.element.style.fontSize = "16px";
            this.element.style.willChange = "transform";

            document.body.appendChild(this.element);

            this.update();
        };

        this.update = function() {
            this.position.x += this.velocity.x;
            this.position.y += this.velocity.y;
            this.lifeSpan--;

            const scale = this.lifeSpan / 100;

            this.element.style.transform =
                `translate3d(${this.position.x}px, ${this.position.y}px, 0) scale(${scale})`;
        };

        this.die = function() {
            this.element.remove();
        };
    }

    init();

})();
    </script>
