/* CSS 变量与核心主题保持不变 */
:root {
    --glow-sens: 30; --dark: hsl(260, 25%, 10%); --fg: black; --h: 260;
    --card-bg: linear-gradient(8deg, var(--dark) 75%, color-mix(in hsl, var(--dark), white 2.5%) 75.5%);
    --blend: soft-light; --glow-blend: plus-lighter; --glow-color: 40deg 80% 80%;
    --duration: 1s; --ease-slider: cubic-bezier(0.4, 0, 0.2, 1); --ease-timeline: cubic-bezier(0.71, 0.21, 0.3, 0.95);
    --page-height: 498px; --accent: hsl(260, 100%, 80%);
    /* 🌟修复毛玻璃动画：将 none 改为 blur(0px)，否则 CSS 无法执行 0.8s 的平滑模糊过渡 */
    --glowing-card-bg: rgb(255 255 255 / 15%); --glowing-card-border: rgb(255 255 255 / 70%); --glowing-card-backdrop: blur(7px);
    --link-card-bg: rgb(255 255 255 / 9%); --link-card-hover-bg: rgb(255 255 255 / 25%); --link-card-border: rgb(255 255 255 / 40%); --link-card-box-shadow: 0px 4px 3px #0001, 0 0 35px #fffa inset;
    --spotify-card-bg: rgb(255 255 255 / 15%); --spotify-card-border: rgb(255 255 255 / 45%); --spotify-card-box-shadow: 0px 4px 3px #0001, 0 0 38px #fffa inset;
    --music-player-bg: rgb(255 255 255 / 15%); --music-player-shadow: none;
}
.light {
    --card-bg: linear-gradient(8deg, color-mix(in hsl, hsl(260, 25%, 95%), var(--dark) 2.5%) 75%, hsl(260, 25%, 95%) 75.5%);
    --blend: darken; --glow-blend: luminosity; --glow-color: 280deg 90% 95%;
    --glowing-card-bg: rgb(255 255 255 / 13%); --glowing-card-border: rgb(255 255 255 / 80%); --glowing-card-backdrop: blur(7px);
    --link-card-bg: rgb(255 255 255 / 7%); --link-card-hover-bg: rgb(255 255 255 / 25%); --link-card-border: rgb(255 255 255 / 45%); --link-card-box-shadow: 0px 4px 3px #0001, 0 0 25px #fffa inset;
    --spotify-card-bg: rgb(255 255 255 / 7%); --spotify-card-border: rgb(255 255 255 / 60%); --spotify-card-box-shadow: 0px 4px 3px #0001, 0 0 38px #fffa inset;
    --music-player-bg: rgb(255 255 255 / 10%); --music-player-shadow: 0 2px 6px 1px #0000001f;
}

body { background-color: #000; margin: 0; padding: 0; min-height: 100dvh; display: flex; justify-content: center; align-items: center; font-family: 'Inter', sans-serif; color: var(--fg); overflow: hidden; touch-action: manipulation; transition: color 0.8s ease; }
.bg-layer { position: fixed; inset: 0; z-index: -2; background-position: center; background-size: cover; background-repeat: no-repeat; transition: opacity 0.8s ease-in-out; opacity: 0; pointer-events: none; will-change: opacity; }
.bg-layer.active { opacity: 1; }

canvas { position: fixed; inset: 0; width: 100%; height: 100dvh; z-index: -1; }

/* 🌟给外部大卡片（发光玻璃卡片）添加背景、边框、发光和模糊的 0.8s 渐变 */
.glowing-card {
    position: relative; width: 100%; max-width: 345px; height: 510px; flex-shrink: 0; border-radius: 20px;

    box-sizing: border-box; border: 1px solid var(--glowing-card-border); backdrop-filter: var(--glowing-card-backdrop);
    transition: background 0.8s ease, border 0.8s ease, box-shadow 0.8s ease, backdrop-filter 0.8s ease;
}

.music-player { --color-gray: #e5e7ea; --color-blue: #78adfe; --color-blue-dark: #5781bd; --box-shadow: 0 2px 6px 1px #0000001f; --cover-size: 4.2em; --border-radius: 1.2em; --music-player-height: calc(var(--page-height) - 0px); --offset-cover: 1em; width: 100%; max-width: 335px; height: 445px; user-select: none; border-radius: var(--border-radius); background-color: var(--music-player-bg); margin: -15px auto 0; box-sizing: border-box; color: inherit; transition: background-color 0.8s ease; }

.slider { --shadow-opacity: 1; z-index: 0; flex-shrink: 0; height: 6.8em; position: relative; border-radius: inherit; transition: var(--duration) height var(--ease-timeline); }

/* 🌟给播放器底层阴影也加上 0.8s 的平滑变暗/变亮效果 */
.slider::after { content: ""; position: absolute; inset: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; border-radius: inherit; box-shadow: var(--box-shadow); opacity: var(--shadow-opacity); transition: opacity var(--duration) ease, box-shadow 0.8s ease; }

.slider__content { position: absolute; top: 0; left: 0; overflow: hidden; border-radius: inherit; width: var(--cover-size); height: var(--cover-size); transition: transform var(--duration) var(--ease-timeline), width var(--duration) var(--ease-timeline), height var(--duration) var(--ease-timeline); transform: translate3d(var(--offset-cover), var(--offset-cover), 0); }

<script>
    // --- [新增机制] 双缓冲背景平滑过渡与图片预加载 ---
    let currentBgLayer = 1;
    let bgChangeSequence = 0;

    function crossfadeBackground(backgroundValue, isLightTheme) {
        const currentChangeId = ++bgChangeSequence;
        const nextBgLayer = currentBgLayer === 1 ? 2 : 1;
        const currentEl = document.getElementById(`bg-layer-${currentBgLayer}`);
        const nextEl = document.getElementById(`bg-layer-${nextBgLayer}`);

        const applyAndFade = () => {
            if (currentChangeId !== bgChangeSequence) return; 

            nextEl.style.background = backgroundValue.startsWith('url') ? `${backgroundValue} center/cover` : backgroundValue;
            
            document.body.classList.toggle('light', isLightTheme);
            document.documentElement.style.setProperty('--fg', isLightTheme ? 'black' : '#f0f0f0');
            
            if(window.bgRenderer) window.bgRenderer.setClearColor(0x000000, 0);
            const canvas = document.getElementById('shuicheCanvas');
            if(window.isParticlesEnabled) canvas.style.display = 'block'; 
            if (currentPage === 3) updateGlowingShadow();

            void nextEl.offsetWidth;

            nextEl.classList.add('active');
            currentEl.classList.remove('active');
            
            currentBgLayer = nextBgLayer;
        };

        if (backgroundValue.startsWith('url')) {
            const urlMatch = backgroundValue.match(/url\(['"]?(.*?)['"]?\)/);
            if (urlMatch && urlMatch[1]) {
                const img = new Image();
                img.onload = applyAndFade;
                img.onerror = applyAndFade; 
                img.src = urlMatch[1];
            } else {
                applyAndFade();
            }
        } else {
            applyAndFade();
        }
    }

    function toggleTheme(theme) {
        if (theme === 'light') {
            crossfadeBackground("url('https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExdnk4ZXVmOG5tdmI1NzUwNHg5cTV0bHZ5NmszeG50Zml5dGNtODV1byZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3ohs4ucXR6NYRxmpTa/giphy.gif')", true);
        } else {
            crossfadeBackground("#000", false);
        }
    }

    function switchBackground(url) {
        crossfadeBackground(`url('${url}')`, true);
    }
    // --- [新增机制结束] ---


    window.isParticlesEnabled = true;
    (function initDoubleClickToggle() {
        let lastToggleTime = 0;
        function toggleParticles(e) {
            let now = new Date().getTime();
            if (now - lastToggleTime < 500) return;
            lastToggleTime = now;
            if (e.target && e.target.closest && e.target.closest('a, button, svg, img, video, .bullet, .link-card, .spotify-card, .play-btn, .theme-toggle, .day-toggle')) {
                return;
            }
            window.isParticlesEnabled = !window.isParticlesEnabled;
            const canvas = document.getElementById('shuicheCanvas');
            if (window.isParticlesEnabled) {
                canvas.style.display = 'block';
                if (window.bgEngine && window.bgEngine.start) window.bgEngine.start();
            } else {
                canvas.style.display = 'none';
                if (window.bgEngine && window.bgEngine.stop) window.bgEngine.stop();
            }
        }
        document.addEventListener('dblclick', toggleParticles);
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (e) {
            let now = new Date().getTime();
            if (now - lastTouchEnd <= 400) {
                toggleParticles(e);
                lastTouchEnd = 0;
            } else {
                lastTouchEnd = now;
            }
        });
    })();

    document.addEventListener('play', e => {
        document.querySelectorAll('audio').forEach(audio => {
            if(audio !== e.target && !audio.paused) {
                audio.pause();
                if (audio.id === 'audioPlayer') {
                    const btn = document.querySelector('.play-btn');
                    if(btn) { btn.classList.remove('playing'); btn.querySelector('.btn-text').innerText = 'Play'; }
                    isPlaying = false;
                }
            }
        });
    }, true);

    (function initBackgroundEngine() {
        const count = 200;
        let scene, camera, renderer, animationId = null, mouseX = 0, mouseY = 0;
        let windowHalfX = window.innerWidth / 2, windowHalfY = window.innerHeight / 2;
        let geometry = new THREE.BufferGeometry();
        
        let posAttribute = new THREE.BufferAttribute(new Float32Array(6 * count), 3);
        posAttribute.setUsage(THREE.DynamicDrawUsage); 
        geometry.setAttribute('position', posAttribute);
        geometry.setAttribute('velocity', new THREE.BufferAttribute(new Float32Array(2 * count), 1));
        
        let positionArray = posAttribute.array;
        let velocityArray = geometry.getAttribute('velocity').array;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 1, 500);
            camera.position.z = 200;
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('shuicheCanvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight, false);
            renderer.setClearColor(0x000000, 0);
            for (let index = 0; index < count; index++) {
                const x = Math.random() * 800 - 400, y = Math.random() * 800 - 400, z = Math.random() * 400 - 200;
                positionArray[6 * index] = x; positionArray[6 * index + 1] = y; positionArray[6 * index + 2] = z;
                positionArray[6 * index + 3] = x; positionArray[6 * index + 4] = y; positionArray[6 * index + 5] = z;
            }
            scene.add(new THREE.LineSegments(geometry, new THREE.LineBasicMaterial({ color: 0xffffff })));
            window.addEventListener('resize', debounceResize, { passive: true });
            document.body.addEventListener('pointermove', e => { mouseX = e.clientX - windowHalfX; mouseY = e.clientY - windowHalfY; }, { passive: true });
            anime();
        }

        let resizeTimeout;
        function debounceResize() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                windowHalfX = window.innerWidth / 2; windowHalfY = window.innerHeight / 2;
            }, 100);
        }

        function anime() {
            for (let index = 0; index < count; index++) {
                velocityArray[2 * index] += 0.015; velocityArray[2 * index + 1] += 0.015;
                positionArray[6 * index + 2] += velocityArray[2 * index] + 0.03;
                positionArray[6 * index + 5] += velocityArray[2 * index + 1];
                if(positionArray[6 * index + 2] > 200) {
                    let z = Math.random() * 200 - 200;
                    positionArray[6 * index + 2] = z; positionArray[6 * index + 5] = z;
                    velocityArray[2 * index] = 0; velocityArray[2 * index + 1] = 0;
                }
            }
            posAttribute.needsUpdate = true;
            camera.position.x += (-mouseX * 0.1 - camera.position.x) * 0.02;
            camera.position.y += (-mouseY * 0.1 - camera.position.y) * 0.02;
            camera.lookAt(scene.position);
            renderer.render(scene, camera);
            animationId = requestAnimationFrame(anime);
        }

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && animationId !== null) { cancelAnimationFrame(animationId); animationId = null; } 
            else if (!document.hidden && animationId === null && window.isParticlesEnabled) { anime(); }
        });

        window.bgEngine = {
            start: () => { if (animationId === null) anime(); },
            stop: () => { if (animationId !== null) { cancelAnimationFrame(animationId); animationId = null; } }
        };

        window.bgRenderer = { setClearColor: (c, a) => renderer.setClearColor(c, a) };
        window.addEventListener('DOMContentLoaded', init);
    })();

    let currentPage = 2;
    const glowingCard = document.querySelector('.glowing-card');
    
    function updateGlowingShadow() {
        if (currentPage !== 3) { glowingCard.style.boxShadow = '0px 10px 15px rgba(0, 0, 0, 0), 0 0 56px #fff inset'; return; }
        glowingCard.style.boxShadow = document.body.classList.contains('light') ? '0px 10px 15px rgba(0, 0, 0, 0), 0 0 56px #fff inset' : '0px 10px 15px rgba(0, 0, 0, 0), 0 0 56px #fff inset';
    }

    window.onload = function() {
        loadMusicPlayer();
        switchPageTo(2);
    };

    function switchPageTo(page) {
        if (page < 1 || page > 3) return;
        currentPage = page;
        document.querySelector('.pages').style.transform = `translateX(-${(page - 1) * 100}%)`;
        document.querySelectorAll('.bullet').forEach(b => b.classList.toggle('active', parseInt(b.dataset.page) === page));
        updateGlowingShadow();
    }

    let isPlaying = false;
    const audio = document.getElementById('audioPlayer');
    function togglePlay(button) {
        if (audio.paused) { audio.play(); button.classList.add('playing'); button.querySelector('.btn-text').innerText = 'Pause'; isPlaying = true; } 
        else { audio.pause(); button.classList.remove('playing'); button.querySelector('.btn-text').innerText = 'Play'; isPlaying = false; }
    }
    audio.addEventListener('ended', () => { isPlaying = false; const btn = document.querySelector('.play-btn'); if (btn) { btn.classList.remove('playing'); btn.querySelector('.btn-text').innerText = 'Play'; } });

function loadMusicPlayer() {
    let indexSong = 0, isLocked = false, songsLength = null, selectedSong = null, songIsPlayed = false, progressBarIsUpdating = false;
    let progress_elmnt, songName_elmnt, sliderImgs_elmnt, singerName_elmnt, progressBar_elmnt, musicPlayerInfo_elmnt, broadcastGuarantor_elmnt;
    const root = document.querySelector("#root"), mainAudio = document.getElementById('mainAudio');
    const nextSongPreloader = new Audio(); nextSongPreloader.preload = "metadata";
    
    function preloadNextSong() {
        if (songsLength === null) return;
        let nextIndex = indexSong + 1 > songsLength ? 0 : indexSong + 1;
        if (nextSongPreloader.src !== songs[nextIndex].files.song) { nextSongPreloader.src = songs[nextIndex].files.song; nextSongPreloader.load(); }
    }

    function savePlaybackState() {
        if (!selectedSong) return;
        localStorage.setItem('musicPlayerState', JSON.stringify({ currentSongIndex: indexSong, isPlaying: !selectedSong.paused, volume: selectedSong.volume, currentTime: selectedSong.currentTime }));
    }
    document.addEventListener('visibilitychange', () => { if (document.hidden) savePlaybackState(); });
    window.addEventListener('beforeunload', savePlaybackState);
    mainAudio.addEventListener('pause', savePlaybackState);

    function restorePlaybackState() {
        try {
            const savedState = localStorage.getItem('musicPlayerState');
            if (!savedState) return;
            const state = JSON.parse(savedState);
            if (state.currentSongIndex !== undefined && state.currentSongIndex >= 0 && state.currentSongIndex <= songsLength) {
                indexSong = state.currentSongIndex; mainAudio.src = songs[indexSong].files.song; mainAudio.load();
                mainAudio.addEventListener('loadedmetadata', () => {
                    if (state.currentTime) mainAudio.currentTime = state.currentTime;
                    if (state.volume !== undefined) mainAudio.volume = state.volume;
                    mainAudio.pause(); broadcastGuarantor_elmnt.classList.remove("click"); songIsPlayed = false;
                    updateInfo(songName_elmnt, songs[indexSong].songName); updateInfo(singerName_elmnt, songs[indexSong].artist);
                    setProperty(sliderImgs_elmnt, "--index", -indexSong); updateMediaSession(); preloadNextSong();
                }, { once: true });
            }
        } catch (e) { console.error("Restore state error:", e); }
    }

    function handleChangeMusic({ isPrev = false, playListIndex = null }) {
        if (isLocked) return;
        let newIndex = playListIndex !== null ? playListIndex : (isPrev ? indexSong - 1 : indexSong + 1);
        if (newIndex < 0) newIndex = songsLength; else if (newIndex > songsLength) newIndex = 0;
        if (newIndex === indexSong) return;
        mainAudio.pause(); indexSong = newIndex; mainAudio.src = songs[indexSong].files.song; mainAudio.load();
        mainAudio.addEventListener('loadedmetadata', () => {
            if (songIsPlayed) mainAudio.play().catch(e => console.log(e));
            savePlaybackState(); preloadNextSong();
        }, { once: true });
        setProperty(sliderImgs_elmnt, "--index", -indexSong);
        updateInfo(songName_elmnt, songs[indexSong].songName); updateInfo(singerName_elmnt, songs[indexSong].artist);
        updateMediaSession();
    }

    function updateMediaSession() {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({ title: songs[indexSong].songName, artist: songs[indexSong].artist, artwork:[{ src: songs[indexSong].files.cover, sizes: '512x512', type: 'image/jpeg' }] });
        }
    }

    function handlePlayMusic() {
        if (mainAudio.currentTime === mainAudio.duration) handleChangeMusic({});
        this.classList.toggle("click"); songIsPlayed = !songIsPlayed;
        mainAudio.paused ? mainAudio.play() : mainAudio.pause();
    }

    const songs = [
        { "bg": "#c9bea28f", "artist": "SCSI-9", "songName": "Senorita Tristeza", "files": { "song": "music/Senorita Tristeza.mp3", "cover": "music/Senorita Tristeza.jpg" }, "duration": "5:53" },
        { "bg": "#0896eba1", "artist": "Paradox Interactive/Sound Of Neon", "songName": "Be Happy", "files": { "song": "music/Be Happy.mp3", "cover": "music/Be Happy.jpg" }, "duration": "3:22" },
        { "bg": "#ebbe03", "artist": "Flower Face", "songName": "Jupiter", "files": { "song": "music/Jupiter.mp3", "cover": "music/Jupiter.jpg" }, "duration": "4:31" },
        { "bg": "#ffc382", "artist": "La Femme", "songName": "Le jardin", "files": { "song": "music/Le jardin.mp3", "cover": "music/Le jardin.jpg" }, "duration": "4:00" },
        { "bg": "#ffcbdc", "artist": "Still Corners", "songName": "Crying", "files": { "song": "music/Crying.mp3", "cover": "music/Crying.jpg" }, "duration": "3:28" },
        { "bg": "#44c16fb5", "artist": "Marvel83'", "songName": "Alone With You", "files": { "song": "music/Alone With You.mp3", "cover": "music/Alone With You.jpg" }, "duration": "4:53" },
        { "bg": "#ff4545", "artist": "Timecop1983", "songName": "Nightfall", "files": { "song": "music/Nightfall.mp3", "cover": "music/Nightfall.jpg" }, "duration": "4:40" },
        { "bg": "#e5e7e9", "artist": "Lazer Boomerang", "songName": "R3cover", "files": { "song": "music/R3cover.mp3", "cover": "music/R3cover.jpg" }, "duration": "3:34" }
    ];

    const musicPlayer = document.createElement("div"); musicPlayer.className = "music-player flex-column";
    const slider = document.createElement("div"); slider.className = "slider center";
    slider.onclick = function({target}){ if(!isLocked){ if(target.classList.contains("music-player__info")){ this.classList.add("resize"); setProperty(this, "--controls-animate", "down running"); }else if(target.classList.contains("music-player__playlist-button")){ this.classList.remove("resize"); setProperty(this, "--controls-animate", "up running"); } } };
    
    const sliderContent = document.createElement("div"); sliderContent.className = "slider__content center";
    sliderContent.innerHTML = `<button class="music-player__playlist-button center button"><i class="icon-playlist"></i></button>`;
    const broadcastGuarantor = document.createElement("button"); broadcastGuarantor.className = "music-player__broadcast-guarantor center button"; broadcastGuarantor.onclick = handlePlayMusic; broadcastGuarantor.innerHTML = `<i class="icon-play"></i><i class="icon-pause"></i>`;
    const sliderImgs = document.createElement("div"); sliderImgs.className = "slider__imgs flex-row";
    songs.forEach(({ files: { cover }, songName }, index) => { const img = document.createElement("img"); img.loading = index === 0 ? "eager" : "lazy"; img.src = cover; img.className = "img lazy-placeholder"; img.alt = songName; sliderImgs.appendChild(img); });
    sliderContent.appendChild(broadcastGuarantor); sliderContent.appendChild(sliderImgs);
    
    const sliderControls = document.createElement("div"); sliderControls.className = "slider__controls center";
    const prevBtn = document.createElement("button"); prevBtn.className = "slider__switch-button flex-row button"; prevBtn.innerHTML = `<i class="icon-back"></i>`; prevBtn.onclick = () => handleChangeMusic({ isPrev: true });
    const musicInfo = document.createElement("div"); musicInfo.className = "music-player__info text_trsf-cap"; musicInfo.innerHTML = `<div><div class="music-player__singer-name"><div>${songs[0].songName}</div></div></div><div><div class="music-player__subtitle"><div>${songs[0].artist}</div></div></div>`;
    const nextBtn = document.createElement("button"); nextBtn.className = "slider__switch-button flex-row button"; nextBtn.innerHTML = `<i class="icon-next"></i>`; nextBtn.onclick = () => handleChangeMusic({ isPrev: false });
    const progress = document.createElement("div"); progress.className = "progress center"; progress.innerHTML = `<div class="progress__wrapper"><div class="progress__bar center"></div></div>`;
    progress.onpointerdown = (e) => { e.preventDefault(); handleScrub(e); progressBarIsUpdating = true; };
    
    sliderControls.append(prevBtn, musicInfo, nextBtn, progress);
    slider.append(sliderContent, sliderControls);
    
    const playlist = document.createElement("ul"); playlist.className = "music-player__playlist list";
    songs.forEach((song, index) => {
        const li = document.createElement("li"); li.className = "music-player__song"; li.onclick = () => handleChangeMusic({ playListIndex: index });
        li.innerHTML = `<div class="flex-row _align_center"><img loading="lazy" src="${song.files.cover}" class="img music-player__song-img lazy-placeholder"><div class="music-player__playlist-info text_trsf-cap"><b class="text_overflow">${song.songName}</b><div class="flex-row _justify_space-btwn"><span class="music-player__subtitle">${song.artist}</span><span class="music-player__song-duration">${song.duration}</span></div></div></div>`;
        playlist.appendChild(li);
    });

    musicPlayer.append(slider, playlist);
    root.innerHTML = ''; root.appendChild(musicPlayer);

    songsLength = songs.length - 1;
    progress_elmnt = document.querySelector(".progress"); sliderImgs_elmnt = document.querySelector(".slider__imgs");
    songName_elmnt = document.querySelector(".music-player__singer-name"); musicPlayerInfo_elmnt = document.querySelector(".music-player__info");
    singerName_elmnt = document.querySelector(".music-player__subtitle"); progressBar_elmnt = document.querySelector(".progress__bar");
    broadcastGuarantor_elmnt = document.querySelector(".music-player__broadcast-guarantor"); selectedSong = mainAudio;

    mainAudio.addEventListener('timeupdate', function(){ setProperty(progressBar_elmnt, "--width", `${(this.currentTime / this.duration) * 100}%`); if('mediaSession' in navigator && !isNaN(this.duration)) navigator.mediaSession.setPositionState({ duration: this.duration, playbackRate: this.playbackRate, position: this.currentTime }); });
    mainAudio.addEventListener('ended', () => { if (songIsPlayed) handleChangeMusic({}); });

    function handleScrub(e) {
        let clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
        selectedSong.currentTime = ((clientX - progress_elmnt.getBoundingClientRect().left) / progress_elmnt.offsetWidth) * selectedSong.duration;
    }

    function controlSubtitleAnimation(parent, child) { if (child.classList.contains("animate")) return; const el = child.firstChild; if (child.clientWidth > parent.clientWidth) { child.appendChild(el.cloneNode(true)); child.classList.add("animate"); } setProperty(child.parentElement, "width", `${el.clientWidth}px`); }
    function setProperty(target, prop, value = "") { target.style.setProperty(prop, value); }
    function updateInfo(target, value) { target.innerHTML = `<div>${value}</div>`; target.classList.remove("animate"); controlSubtitleAnimation(musicPlayerInfo_elmnt, target); }

    mainAudio.src = songs[0].files.song; mainAudio.load();
    mainAudio.addEventListener('loadedmetadata', () => { preloadNextSong(); controlSubtitleAnimation(musicPlayerInfo_elmnt, songName_elmnt); controlSubtitleAnimation(musicPlayerInfo_elmnt, singerName_elmnt); }, { once: true });
    setTimeout(restorePlaybackState, 100);

    if ('mediaSession' in navigator) {
        updateMediaSession();
        navigator.mediaSession.setActionHandler('previoustrack', () => handleChangeMusic({ isPrev: true })); navigator.mediaSession.setActionHandler('nexttrack', () => handleChangeMusic({ isPrev: false }));
        navigator.mediaSession.setActionHandler('play', () => { if (mainAudio.paused) { mainAudio.play(); broadcastGuarantor_elmnt.classList.add("click"); songIsPlayed = true; } });
        navigator.mediaSession.setActionHandler('pause', () => { if (!mainAudio.paused) { mainAudio.pause(); broadcastGuarantor_elmnt.classList.remove("click"); songIsPlayed = false; } });
        navigator.mediaSession.setActionHandler('seekto', (details) => { if (details.seekTime != null) { ('fastSeek' in mainAudio && details.fastSeek) ? mainAudio.fastSeek(details.seekTime) : (mainAudio.currentTime = details.seekTime); } });
    }

    window.addEventListener("resize", () => setProperty(document.documentElement, "--vH", `${window.innerHeight * 0.01}px`), {passive:true});
    window.addEventListener("transitionstart", ({ target }) => { if (target === sliderImgs_elmnt) { isLocked = true; setProperty(sliderImgs_elmnt, "will-change", "transform"); } });
    window.addEventListener("transitionend", ({ target, propertyName }) => { if (target === sliderImgs_elmnt) { isLocked = false; setProperty(sliderImgs_elmnt, "will-change", "auto"); } if (target.classList.contains("slider") && propertyName === "height") { controlSubtitleAnimation(musicPlayerInfo_elmnt, songName_elmnt); controlSubtitleAnimation(musicPlayerInfo_elmnt, singerName_elmnt); } });
    
    const resetScrub = () => { if (progressBarIsUpdating) { selectedSong.muted = false; progressBarIsUpdating = false; } };
    const doScrub = (e) => { if (progressBarIsUpdating) { e.preventDefault(); handleScrub(e); selectedSong.muted = true; } };
    window.addEventListener("pointerup", resetScrub); window.addEventListener("touchend", resetScrub, {passive: true});
    window.addEventListener("pointermove", doScrub, {passive: false}); window.addEventListener("touchmove", doScrub, {passive: false});
}
      
    const scrollContainer = document.querySelector('.link-scroll-container');
    let scrollTimeout;
    if (scrollContainer) {
        scrollContainer.addEventListener('scroll', () => {
            scrollContainer.classList.add('scrolling'); clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => scrollContainer.classList.remove('scrolling'), 1500);
        }, { passive: true });
    }

    const avatarSound = new Audio("music/Cat.wav"); avatarSound.volume = 0.35;
    function triggerConfetti() {
        if(typeof confetti === 'function') confetti({particleCount:150, spread:100});
        if(avatarSound) avatarSound.play().catch(e=>console.log(e));
    }
  
    function toggleReward() { document.getElementById('rewardContainer').classList.toggle('show-qr'); }

    const wechatID = "lllIIllIIlIII";
    if (typeof ClipboardJS !== 'undefined') {
        var clipboard = new ClipboardJS('#wechatBtn', { text: () => wechatID });
        clipboard.on('success', () => { alert('👉微信号复制成功,即将前往微信！'); window.location.href = 'wechat://'; });
        clipboard.on('error', () => { alert('复制失败,请手动输入 ' + wechatID); window.location.href = 'wechat://dl/scan'; });
    }

    const video = document.getElementById('page1Video'); 
    let videoLoaded = false;
    
    if ('IntersectionObserver' in window) {
        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    if (!videoLoaded) { video.src = "music/Movie.MP4"; videoLoaded = true; }
                    video.muted = true; video.play().catch(() => {});
                } else {
                    video.pause();
                }
            });
        }, { threshold: 0.5 });
        videoObserver.observe(document.getElementById('page1-5'));
    }
    video.addEventListener('click', () => video.muted = false);
  
        document.querySelectorAll('.theme-toggle').forEach(button => {
            button.addEventListener('mouseenter', function() {
                this.style.transform = 'scale(1.2)';
            });
            button.addEventListener('mouseleave', function() {
                this.style.transform = 'scale(1)';
            });
            button.addEventListener('click', function() {
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 350);
            });
        });
      
        document.querySelectorAll('.day-toggle').forEach(button => {
            button.addEventListener('mouseenter', function() {
                this.style.transform = 'scale(1.2)';
            });
            button.addEventListener('mouseleave', function() {
                this.style.transform = 'scale(1)';
            });
            button.addEventListener('click', function() {
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 350);
            });
        });

</script>
